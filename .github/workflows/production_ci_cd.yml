# .github/workflows/production_ci_cd.yml
name: LEVI-AI Sovereign Pro Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  SERVICE_NAME: levi-backend
  CLUSTER_NAME: levi-sovereign-cluster-us
  REGION: us-central1

jobs:
  test-and-lint:
    name: Critical Audit Gate
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio
    - name: Run Forensic Audit Tests
      run: |
        export ENVIRONMENT=testing
        pytest tests/forensic_audit.py

  kernel-build:
    name: HAL-0 Rust Kernel Verification
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install Rust & Target
      run: |
        rustup toolchain install nightly
        rustup target add x86_64-unknown-none
    - name: Build Bootable Kernel Image
      run: |
        cd backend/kernel/bare_metal
        cargo bootimage --release
    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v3
      with:
        name: hal0-kernel-image
        path: backend/kernel/bare_metal/target/x86_64-unknown-none/release/bootimage-hal0-bare.bin

  terraform-plan:
    name: Infrastructure Blueprint Validation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: hashicorp/setup-terraform@v2
    - name: Terraform Init & Plan
      env:
        PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      run: |
        cd infrastructure/terraform
        terraform init
        terraform plan -var="gcp_project_id=${{ env.PROJECT_ID }}"

  deploy:
    name: Sovereign Dual-Deployment Push
    needs: [test-and-lint, kernel-build, terraform-plan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v1'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v1'

    - name: 'Configure Docker'
      run: gcloud auth configure-docker --quiet

    - name: 'Build and Push Cognitive Cloud Engine'
      env:
        PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      run: |
        docker build -t gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA .
        docker tag gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA gcr.io/$PROJECT_ID/$SERVICE_NAME:latest
        docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA
        docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:latest

    - name: 'Apply Cloud Infrastructure'
      env:
        PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      run: |
        cd infrastructure/terraform
        terraform init
        terraform apply -auto-approve -var="gcp_project_id=${{ env.PROJECT_ID }}"

    - name: 'Deploy to GKE Autopilot (Cognitive Soul)'
      env:
        PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      run: |
        gcloud container clusters get-credentials $CLUSTER_NAME --region $REGION
        kubectl set image deployment/levi-backend-deployment levi-backend=gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA

    - name: 'Trigger Edge Node Update (HAL-0 Body)'
      run: |
        echo "📡 Alerting physical edge nodes of kernel update $(date)"
        # This would typically trigger a PXE update or IPMI reboot
        # For this audit, we log the graduation outcome.
