<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <title>LEVI-AI | Mission Planner</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/styles.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/config.js"></script>
    <script src="js/shared.js"></script>
    <style>
        .react-flow__node {
            background: #0f172a !important;
            border: 1px solid rgba(168, 85, 247, 0.4) !important;
            border-radius: 12px !important;
            color: #e2e8f0 !important;
            padding: 15px !important;
            font-family: 'Outfit', sans-serif !important;
            -webkit-backdrop-filter: blur(10px) !important;
            backdrop-filter: blur(10px) !important;
        }
        .react-flow__handle {
            background: #a855f7 !important;
            border: 2px solid #0f172a !important;
            width: 8px !important;
            height: 8px !important;
        }
        .react-flow__edge-path {
            stroke: rgba(168, 85, 247, 0.4) !important;
            stroke-width: 2 !important;
        }
        .node-header {
            font-size: 10px;
            font-weight: 700;
            color: #a855f7;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        .node-body {
            font-size: 13px;
            font-weight: 400;
        }
    </style>
</head>
<body class="bg-[#050507] text-slate-200">
    <div class="h-screen flex flex-col pt-24">
        <!-- Overlay Navigation (Injected by shared.js) -->
        <nav class="fixed top-0 left-0 right-0 z-50 p-6">
            <div id="sovereign-nav-container" class="max-w-7xl mx-auto sovereign-glass px-8 py-4 flex justify-between items-center bg-white/5 border border-white/10">
                <div class="flex items-center gap-4">
                    <span class="text-2xl font-bold tracking-tighter text-neural">LEVI-AI</span>
                    <span class="text-[10px] uppercase tracking-[0.3em] text-slate-500 font-bold border-l border-white/10 pl-4">Mission Blueprint</span>
                </div>
                <div id="sovereign-nav" class="flex items-center gap-8">
                    <!-- shared.js injections -->
                </div>
            </div>
        </nav>

        <div class="flex-1 relative" id="flow-container">
            <!-- React Flow canvas will be injected here -->
            <div class="absolute inset-0 flex items-center justify-center opacity-20 pointer-events-none">
                <p class="text-[12rem] font-bold tracking-tighter select-none">PLANNER</p>
            </div>
            
            <div id="react-flow-root" class="w-full h-full"></div>

            <div class="absolute bottom-8 left-8 flex flex-col gap-3">
                <button onclick="zoomToFit()" class="p-4 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 transition-all">
                    <span class="material-symbols-outlined text-slate-400">fullscreen</span>
                </button>
                <button onclick="toggleLock()" class="p-4 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 transition-all">
                    <span class="material-symbols-outlined text-slate-400">lock_open</span>
                </button>
            </div>
        </div>
    </div>

    <!-- React Flow Libs -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xyflow/react@12/dist/umd/index.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xyflow/react@12/dist/style.css" />

    <script>
        const { ReactFlow, Background, Controls } = window.ReactFlow;

        // Implementation of the Blueprint flow visualization
        function initPlanner() {
            // Simplified for non-headless demonstration
            console.log("Planner initialized.");
        }

        window.onload = initPlanner;
    </script>
</body>
</html>
