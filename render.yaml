services:
  - type: web
    name: backend
    runtime: docker
    dockerfilePath: backend/Dockerfile.prod
    dockerContext: .
    plan: free
    healthCheckPath: /health
    preDeployCommand: python seed.py
    envVars:
      - key: RENDER
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TRANSFORMERS_CACHE
        value: /app/model_cache
      - key: CLIENT_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: "info"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: PORT
        value: "10000"

  - type: web
    name: rasa-server
    runtime: docker
    dockerfilePath: rasa/Dockerfile.server
    dockerContext: .
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "5005"

  - type: web
    name: rasa-actions
    runtime: docker
    dockerfilePath: rasa/Dockerfile.actions
    dockerContext: .
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "5055"
