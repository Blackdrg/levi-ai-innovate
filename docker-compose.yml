version: '3.8'

services:
  # --- Persistent Substrate ---
  postgres:
    image: postgres:14-alpine
    container_name: levi-postgres
    environment:
      POSTGRES_DB: levi_ai
      POSTGRES_PASSWORD: sovereign_password
    ports:
      - "5432:5432"
    volumes:
      - levi_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: levi-redis
    ports:
      - "6379:6379"

  # --- The Native Core (HAL-0) ---
  kernel-service:
    build:
      context: ./backend/kernel
      dockerfile: Dockerfile
    container_name: levi-kernel
    ports:
      - "8001:8001"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  # --- The Sovereign Mainframe (Soul) ---
  mainframe:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: levi-mainframe
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - kernel-service
    environment:
      - DATABASE_URL=postgresql://postgres:sovereign_password@postgres:5432/levi_ai
      - REDIS_HOST=redis
      - RUST_RUNTIME_URL=http://kernel-service:8001
      - ENVIRONMENT=production
    volumes:
      - ./data:/app/data

volumes:
  levi_pg_data:
