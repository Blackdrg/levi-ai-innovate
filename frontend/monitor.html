<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <title>LEVI-AI | Neural Evolution Dashboard</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Sovereign Design System -->
    <link rel="stylesheet" href="./css/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Sovereign Core -->
    <script src="js/config.js"></script>
    <script src="js/levi-api.js"></script>
    <script src="js/shared.js"></script>
</head>

<body class="bg-[#050507] text-slate-200 font-['Outfit'] overflow-x-hidden">

    <!-- Spectral Ambiance -->
    <div class="fixed top-[-10%] right-[-10%] w-[600px] h-[600px] bg-purple-500/5 blur-[120px] rounded-full pointer-events-none"></div>

    <!-- Sovereign Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 p-6">
        <div class="max-w-6xl mx-auto sovereign-glass px-8 py-4 flex justify-between items-center bg-white/5 border border-white/10">
            <div class="flex items-center gap-4">
                <span class="text-2xl font-bold tracking-tighter text-neural">LEVI-AI</span>
                <span class="text-[10px] uppercase tracking-[0.3em] text-slate-500 font-bold border-l border-white/10 pl-4">Evolution Dashboard</span>
            </div>
            <div id="sovereign-nav" class="flex items-center gap-8">
                <!-- Injected via shared.js -->
            </div>
        </div>
    </nav>

    <!-- Dashboard Content -->
    <main class="relative z-10 pt-32 pb-20 px-6 max-w-6xl mx-auto">
        
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-bold tracking-tight text-white mb-3">Neural Evolution</h1>
            <p class="text-slate-400 max-w-2xl mx-auto text-sm leading-relaxed">
                Observing the autonomous growth and collective wisdom of the LEVI-AI Sovereign OS. 
                Real-time telemetry from the Global Neural Pulse.
            </p>
        </header>

        <!-- Component: Neural Pulse Telemetry -->
        <div id="neural-pulse-container"></div>

        <!-- Component: Memory Vault (Crystallized Patterns) -->
        <div id="memory-vault-container"></div>

    </main>

    <!-- Sovereign Components -->
    <script src="./js/components/NeuralPulse.js"></script>
    <script src="./js/components/MemoryVault.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Initialize high-fidelity components
            new NeuralPulse("neural-pulse-container");
            new MemoryVault("memory-vault-container");
            
            console.info("[Sovereign] Evolution UI Synchronized.");
        });
    </script>
</body>
</html>
