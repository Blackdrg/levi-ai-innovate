<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8B5CF6">
    <title>LEVI Chat - Artistic AI Companion & Wisdom Generator</title>
    
    <!-- SEO & PWA -->
    <meta name="description"
        content="Chat with LEVI, your artistic AI companion. Generate unique wisdom and visual art in real-time conversations.">
    <meta name="keywords" content="AI chat, wisdom generator, artistic AI, LEVI, philosophical AI">
    <link rel="canonical" href="https://levi-ai.example.com/chat.html">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/000000/brain.png">
    
    <!-- OpenGraph / Social -->
    <meta property="og:title" content="LEVI AI Chat - Real-time Wisdom & Art">
    <meta property="og:description" content="Talk to LEVI, your AI Muse. Spark your creativity with every message.">
    <meta property="og:url" content="https://levi-ai.example.com/chat.html">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://img.icons8.com/fluency/512/000000/brain.png">
    <meta name="twitter:card" content="summary">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animations.css">
    <script src="js/chat.js" type="module" defer></script>
    <script src="js/ui.js" type="module" defer></script>
    <!-- Vercel Analytics & Speed Insights -->
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body class="bg-primary text-main min-h-screen flex flex-col overflow-hidden">
    <!-- Navigation -->
    <nav class="w-full max-w-7xl mx-auto flex justify-between items-center mb-16 p-4 glass border-b border-white/5 z-50">
        <a href="index.html"
            class="text-2xl font-black bg-gradient-to-r from-violet-400 to-emerald-400 bg-clip-text text-transparent hover:opacity-80 transition-opacity">LEVI</a>
        <div class="flex flex-wrap gap-3 items-center justify-end">
            <button onclick="window.toggleLanguage()" class="glass px-3 py-2 rounded-xl text-xs hover:bg-white/5 transition-all">🌐
                EN/HI</button>
            <button id="dark-toggle" class="glass p-2 rounded-xl hover:bg-white/5 transition-all">☀️</button>
            <a href="chat.html"
                class="glass px-4 py-2 rounded-xl hover:bg-white/5 transition-all text-xs md:text-sm font-medium">Chat</a>
            <a href="studio.html"
                class="glass px-4 py-2 rounded-xl hover:bg-white/5 transition-all text-xs md:text-sm font-medium">Studio</a>
            <a href="feed.html"
                class="glass px-4 py-2 rounded-xl hover:bg-white/5 transition-all text-xs md:text-sm font-medium">Feed</a>
            <a href="quotes.html"
                class="glass px-4 py-2 rounded-xl hover:bg-white/5 transition-all text-xs md:text-sm font-medium">Explore</a>
        </div>
    </nav>

    <!-- Chat Interface -->
    <div id="chat-container" class="flex-1 max-w-5xl mx-auto w-full flex flex-col p-4 md:p-8 relative">
        <!-- Messages Area -->
        <div id="messages" class="flex-1 overflow-y-auto space-y-6 mb-6 pr-4 custom-scrollbar">
            <!-- Welcome Message -->
            <div class="bot-message message-bubble animate-fade-in">
                <div class="text-xs font-bold uppercase tracking-widest text-emerald-400 mb-2">LEVI AI</div>
                <div class="text-lg">Greetings, seeker of wisdom. I am LEVI, your artistic AI companion. How may I inspire you today?</div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="glass p-6 rounded-[2rem] border-white/10 shadow-2xl relative">
            <!-- Mood Quick Select -->
            <div class="flex flex-wrap gap-2 mb-4">
                <button class="mood-btn glass hover:border-violet-500 px-3 py-1 rounded-full text-xs transition-all" data-mood="inspiring">✨ Inspiring</button>
                <button class="mood-btn glass hover:border-emerald-500 px-3 py-1 rounded-full text-xs transition-all" data-mood="calm">🍃 Calm</button>
                <button class="mood-btn glass hover:border-pink-500 px-3 py-1 rounded-full text-xs transition-all" data-mood="energetic">⚡ Energetic</button>
                <button class="mood-btn glass hover:border-slate-500 px-3 py-1 rounded-full text-xs transition-all" data-mood="stoic">🏛️ Stoic</button>
                <button class="mood-btn glass hover:border-fuchsia-500 px-3 py-1 rounded-full text-xs transition-all" data-mood="cyberpunk">🌃 Cyberpunk</button>
                <button class="mood-btn glass hover:border-amber-500 px-3 py-1 rounded-full text-xs transition-all" data-mood="philosophical">📖 Philosophical</button>
            </div>


            <div class="flex items-center gap-3">
                <div class="relative flex-1">
                    <input id="message-input" type="text" 
                        placeholder="Type your message or ask for wisdom..." 
                        class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 focus:ring-2 ring-violet-500/50 outline-none transition-all pr-12">
                    <button id="mic-btn" class="absolute right-4 top-1/2 -translate-y-1/2 text-muted hover:text-white transition-colors">
                        🎤
                    </button>
                </div>
                <button id="send-btn" class="btn-primary p-4 rounded-2xl" aria-label="Send message" title="Send message">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Background Decoration -->
    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-violet-600/10 rounded-full blur-[120px] pointer-events-none -z-10"></div>
    <div class="fixed bottom-0 right-0 w-[500px] h-[500px] bg-emerald-600/10 rounded-full blur-[100px] pointer-events-none -z-10"></div>

    <footer class="w-full max-w-7xl mx-auto border-t border-white/10 pt-8 pb-4 text-center mt-auto">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 text-muted text-[10px] px-4">
            <div>© 2026 LEVI AI.</div>
            <div class="flex gap-4">
                <a href="privacy.html" class="hover:text-primary transition-colors">Privacy</a>
                <a href="terms.html" class="hover:text-primary transition-colors">Terms</a>
            </div>
        </div>
    </footer>
</body>
</html>
