name: Deploy Backend to Cloud Run

on:
  push:
    branches: [ master ]
    paths:
      - 'backend/**'
      - 'Dockerfile.prod'
      - '.github/workflows/deploy-backend.yml'

env:
  PROJECT_ID: levi-ai-c23c6
  SERVICE_NAME: levi-backend
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push Container
        run: |-
          docker build --no-cache -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/levi-repo/${{ env.SERVICE_NAME }}:${{ github.sha }} -f backend/Dockerfile.prod .
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/levi-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        id: deploy
        run: |-
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/levi-repo/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "ENVIRONMENT=production" \
            --set-env-vars "GITHUB_SHA=${{ github.sha }}" \
            --set-env-vars "SECRET_KEY=${{ secrets.SECRET_KEY }}" \
            --set-env-vars "RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}" \
            --set-env-vars "RAZORPAY_KEY_SECRET=${{ secrets.RAZORPAY_KEY_SECRET }}" \
            --set-env-vars "RAZORPAY_WEBHOOK_SECRET=${{ secrets.RAZORPAY_WEBHOOK_SECRET }}" \
            --set-env-vars "ADMIN_KEY=${{ secrets.ADMIN_KEY }}" \
            --set-env-vars "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" \
            --set-env-vars "TOGETHER_API_KEY=${{ secrets.TOGETHER_API_KEY }}" \
            --set-env-vars "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" \
            --set-env-vars "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" \
            --set-env-vars "FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" \
            --set-env-vars "FIREBASE_SERVICE_ACCOUNT_JSON=${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" \
            --set-env-vars "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" \
            --set-env-vars "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --set-env-vars "AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}" \
            --set-env-vars "REDIS_URL=${{ secrets.REDIS_URL }}" \
            --set-env-vars "VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}" \
            --set-env-vars "VAPID_MAILTO=${{ secrets.VAPID_MAILTO }}" \
            --set-env-vars "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" \
            --port 8080 \
            --format='value(status.url)' > service_url.txt

          echo "SERVICE_URL=$(cat service_url.txt)" >> $GITHUB_ENV

      - name: Post-Deploy Health Check (Extended)
        run: |
          echo "Verifying deployment at $SERVICE_URL..."
          # Max retries: 15, Wait: 6s -> Total 90s (Firestore init + Server boot)
          for i in {1..15}; do
            echo "Attempt $i..."
            # 1. Fetch health JSON
            HEALTH_JSON=$(curl -s -f "$SERVICE_URL/health")
            
            # 2. Check for overall status, database, and auth
            echo "Health Response: $HEALTH_JSON"
            
            STATUS=$(echo $HEALTH_JSON | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
            DB_STATUS=$(echo $HEALTH_JSON | grep -o '"database":"[^"]*"' | cut -d'"' -f4)
            AUTH_STATUS=$(echo $HEALTH_JSON | grep -o '"auth":"[^"]*"' | cut -d'"' -f4)
            REMOTE_SHA=$(echo $HEALTH_JSON | grep -o '"version":"[^"]*"' | cut -d'"' -f4)

            if [ "$STATUS" = "ok" ] && [ "$DB_STATUS" = "ok" ] && [ "$AUTH_STATUS" = "ok" ]; then
              echo "✅ Backend is healthy."
              if [ "$REMOTE_SHA" = "${{ github.sha }}" ]; then
                echo "✅ Version matches: $REMOTE_SHA"
                exit 0
              else
                echo "⚠️ Version mismatch (Old: $REMOTE_SHA, New: ${{ github.sha }}). Waiting for propagation..."
              fi
            else
              echo "❌ Health check failed: STATUS=$STATUS, DB=$DB_STATUS, AUTH=$AUTH_STATUS"
            fi
            
            sleep 6
          done
          echo "❌ Backend health check FAILED after 15 attempts."
          exit 1

      - name: Failure Diagnostics (Monitoring)
        if: failure()
        run: |
          echo "--- SERVICE LOGS ---"
          gcloud run services logs tail ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --limit 50
          echo "--- END LOGS ---"
