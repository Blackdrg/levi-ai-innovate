<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascension Successful — LEVI</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Plus+Jakarta+Sans:wght@200..800&display=swap"
      rel="stylesheet" />
    <style>
      body {
        background: #131317;
        color: #e5e1e7;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
    
      .container {
        text-align: center;
        padding: 3rem;
        background: rgba(27, 27, 31, 0.6);
        -webkit-backdrop-filter: blur(20px);
        backdrop-filter: blur(20px);
        border: 0.5px solid rgba(255, 255, 255, 0.08);
        border-radius: 2rem;
        max-width: 400px;
        width: 90%;
      }
    
      .icon {
        font-size: 3rem;
        margin-bottom: 1.5rem;
        color: #f2ca50;
        font-family: serif;
        font-style: italic;
      }
    
      .title {
        font-family: 'Newsreader', serif;
        font-style: italic;
        font-size: 2.5rem;
        margin-bottom: 1rem;
        background: linear-gradient(to right, #f2ca50, #d4af37);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    
      .subtitle {
        color: #94a3b8;
        margin-bottom: 2.5rem;
        font-weight: 300;
        line-height: 1.6;
      }
    
      .btn-primary {
        background: linear-gradient(135deg, #f2ca50, #d4af37);
        color: #3c2f00;
        padding: 1rem 2.5rem;
        border-radius: 9999px;
        font-weight: bold;
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 0.75rem;
      }
    
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(242, 202, 80, 0.2);
      }
    </style>
</head>
<body>
  <div class="container">
    <div class="icon">✓</div>
    <h1 class="title">Payment successful!</h1>
    <p class="subtitle">Your account has been upgraded.</p>
    <a href="studio.html" class="btn-primary">Go to Studio</a>
  </div>
  <script type="module">
    import { getProfile } from './js/api.js';
    import './js/ui.js';

    async function init() {
      const token = localStorage.getItem('levi_token');
                    if (!token) {
                      window.location.href = 'auth.html';
                      return;
                    }

                    try {
                      // Refresh profile to update credits in local state
                      const profile = await getProfile(token);
                      localStorage.setItem('levi_user', profile.username);
                      localStorage.setItem('levi_credits', profile.credits);
                      localStorage.setItem('levi_tier', profile.tier);

                      window.ui.showToast("Account upgraded successfully! ✨");
                    } catch (err) {
                      console.error("Profile refresh failed:", err);
                    }
                  }
                  init();
                </script>
<script src="js/animations.js" type="module"></script>
<script src="js/feedback.js" type="module"></script>
</body>
</html>
