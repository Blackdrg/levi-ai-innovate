# .github/workflows/production_ci_cd.yml
name: LEVI-AI Sovereign Pro Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: levi-backend
  CLUSTER_NAME: levi-sovereign-cluster-us
  REGION: us-central1

jobs:
  test-and-lint:
    name: Critical Audit Gate
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio
    - name: Run Forensic Audit Tests
      run: |
        export ENVIRONMENT=testing
        pytest tests/forensic_audit.py

  kernel-build:
    name: HAL-0 Rust Kernel Verification
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
    - name: Compile Bare-Metal Stubs
      run: |
        cd backend/kernel/bare_metal
        cargo build --release

  terraform-plan:
    name: Infrastructure Blueprint Validation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: hashicorp/setup-terraform@v2
    - name: Terraform Init & Plan
      run: |
        cd infrastructure/terraform
        terraform init
        terraform plan -var="gcp_project_id=${{ secrets.GCP_PROJECT_ID }}"

  deploy:
    name: Production Graduation Push
    needs: [test-and-lint, kernel-build, terraform-plan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v1'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v1'

    - name: 'Configure Docker'
      run: gcloud auth configure-docker --quiet

    - name: 'Build and Push Docker Image'
      run: |
        docker build -t gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA .
        docker tag gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA gcr.io/$PROJECT_ID/$SERVICE_NAME:latest
        docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA
        docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:latest

    - name: 'Apply Infrastructure Updates'
      run: |
        cd infrastructure/terraform
        terraform init
        terraform apply -auto-approve -var="gcp_project_id=${{ secrets.GCP_PROJECT_ID }}"

    - name: 'Deploy to GKE Autopilot'
      run: |
        gcloud container clusters get-credentials $CLUSTER_NAME --region $REGION
        # Update image version in K8s deployment
        kubectl set image deployment/levi-backend-deployment levi-backend=gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA
