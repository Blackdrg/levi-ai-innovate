version: '3.8'

services:
  hal-0:
    build:
      context: .
      dockerfile: backend/levi_runtime/Dockerfile
    environment:
      - NODE_ID=HAL-0-PRIMARY
      - PORT=8001
      - DCN_PEERS=hal-1:8002,hal-2:8003
    ports:
      - "8001:8001"

  hal-1:
    build:
      context: .
      dockerfile: backend/levi_runtime/Dockerfile
    environment:
      - NODE_ID=HAL-1-FOLLOWER
      - PORT=8002
      - DCN_PEERS=hal-0:8001,hal-2:8003
    ports:
      - "8002:8002"

  hal-2:
    build:
      context: .
      dockerfile: backend/levi_runtime/Dockerfile
    environment:
      - NODE_ID=HAL-2-FOLLOWER
      - PORT=8003
      - DCN_PEERS=hal-0:8001,hal-1:8002
    ports:
      - "8003:8003"
