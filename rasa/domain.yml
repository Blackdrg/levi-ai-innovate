version: "3.1"

intents:
  - greeting
  - goodbye
  - quote_by_mood
  - quote_by_topic
  - quote_by_author
  - generate_quote
  - fallback

entities:
  - mood
  - topic
  - author

responses:
  utter_greet:
  - text: "Hello! Ready for quotes? Ask by mood, topic, author, or generate one!"

  utter_quote_by_mood:
  - text: "Here's a {mood} quote: {quote_text} - {author}"

  utter_quote_by_topic:
  - text: "On {topic}: '{quote_text}' — {author}"

  utter_quote_by_author:
  - text: "{author} said: '{quote_text}'"

  utter_generate:
  - text: "Here's a generated quote: '{generated_quote}'"

  utter_goodbye:
  - text: "Bye! More quotes anytime."

  utter_fallback:
  - text: "Sorry, try 'motivate me', 'Steve Jobs quote', or 'generate quote'."

