apiVersion: apps/v1
kind: Deployment
metadata:
  name: levi-api
  labels:
    app: levi-api
    tier: brain
spec:
  replicas: 2
  selector:
    matchLabels:
      app: levi-api
  template:
    metadata:
      labels:
        app: levi-api
    spec:
      containers:
      - name: api
        image: gcr.io/levi-sovereign/api:v14.1.0
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: levi-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /api/v1/orchestrator/health/readiness
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: levi-api-hpa
spec:
  scaleTargetRef:
    apiUint: apps/v1
    kind: Deployment
    name: levi-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: levi-api-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: levi-api
