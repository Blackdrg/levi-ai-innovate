groups:
  - name: levi-execution-alerts
    rules:
      - alert: LeviFailureSpike
        expr: increase(mission_failures_total[5m]) > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Mission failure spike detected"
          description: "Mission failures increased by more than 5 over the last 5 minutes."

      - alert: LeviMemoryMismatch
        expr: increase(alerts_total{alert_type="memory_mismatch"}[15m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Memory mismatch detected"
          description: "The brain reported a memory mismatch or sync anomaly."

      - alert: LeviLatencyBreach
        expr: histogram_quantile(0.95, sum(rate(node_latency_ms_bucket[5m])) by (le)) > 1500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 node latency breach"
          description: "P95 node latency exceeded 1500ms for 5 minutes."

      - alert: LeviSLOBurnRateHigh
        expr: (sum(rate(mission_failures_total[1h])) / sum(rate(mission_requests_total[1h]))) > 0.05
        for: 10m
        labels:
          severity: critical
          pagerduty: service_one
        annotations:
          summary: "High SLO Error Budget Burn"
          description: "Mission error rate is above 5% over the last hour."

      - alert: LeviVRAMSaturation
        expr: (gpu_vram_used_mb / gpu_vram_total_mb) > 0.85
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "GPU VRAM Saturation"
          description: "VRAM usage is above 85% for more than 5 minutes. Backpressure expected."

      - alert: LeviDLQDepthSpike
        expr: celery_queue_length{queue="dlq"} > 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "DLQ Depth Spike"
          description: "Dead Letter Queue has more than 10 messages. Manual intervention required."
