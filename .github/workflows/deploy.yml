name: Sovereign-CD-v13

on:
  push:
    branches: [ main, production ]
  workflow_dispatch:

env:
  PROJECT_ID: levi-ai-sovereign
  GKE_CLUSTER: absolute-monolith-cluster
  GKE_ZONE: us-central1-a
  IMAGE_NAME: sovereign-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: "${{ secrets.GCP_SA_KEY }}"

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    - name: Configure Docker
      run: gcloud auth configure-docker --quiet

    - name: Build and Push Docker Image
      run: |
        TAG=$(git rev-parse --short HEAD)
        docker build -t gcr.io/$PROJECT_ID/$IMAGE_NAME:$TAG .
        docker build -t gcr.io/$PROJECT_ID/$IMAGE_NAME:latest .
        docker push gcr.io/$PROJECT_ID/$IMAGE_NAME:$TAG
        docker push gcr.io/$PROJECT_ID/$IMAGE_NAME:latest

    - name: Set up Kustomize
      run: |
        curl -sfLo kustomize https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv4.5.2/kustomize_v4.5.2_linux_amd64.tar.gz
        tar -xzf kustomize
        chmod u+x kustomize

    - name: Deploy to GKE (Canary Rollout)
      run: |
        gcloud container clusters get-credentials $GKE_CLUSTER --zone $GKE_ZONE
        ./kustomize edit set image gcr.io/$PROJECT_ID/$IMAGE_NAME:$TAG
        ./kustomize build backend/deployment/k8s | kubectl apply -f -
        
        # Verify rollout
        kubectl rollout status deployment/sovereign-backend
        
    - name: Automated Rollback on Failure
      if: failure()
      run: |
        echo "Deployment failed. Rolling back..."
        kubectl rollout undo deployment/sovereign-backend
