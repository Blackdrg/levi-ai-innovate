# docker-stack.yml
# Sovereign v16.2 Production Swarm Configuration
version: '3.8'

services:
  redis:
    image: redis:7-alpine
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-levi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-levi_password}
      POSTGRES_DB: ${POSTGRES_DB:-levi_db}
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U levi -d levi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      - NEO4J_AUTH=neo4j/levi_pass_graph
      - NEO4J_PLUGINS=["apoc"]
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "cypher-shell", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  api:
    image: blackdrg/levi-api:latest
    environment:
      - DATABASE_URL=postgresql+asyncpg://levi:levi_password@postgres:5432/levi_db
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URI=mongodb://admin:admin_password@mongodb:27017
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=levi_pass_graph
      - ENVIRONMENT=production
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "8000:8000"
      - "9000:9000"

  dashboard:
    image: blackdrg/levi-dashboard:latest
    deploy:
      replicas: 1
    ports:
      - "80:5173"
    environment:
      - VITE_API_BASE_URL=http://api:8000
