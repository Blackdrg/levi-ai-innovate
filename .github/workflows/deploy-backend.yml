name: Deploy Backend to Cloud Run

on:
  push:
    branches: [ master ]
    paths:
      - 'backend/**'
      - 'Dockerfile.prod'
      - '.github/workflows/deploy-backend.yml'

env:
  PROJECT_ID: levi-ai-c23c6
  SERVICE_NAME: levi-backend
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe levi-repo --location=${{ env.REGION }} || \
          gcloud artifacts repositories create levi-repo --repository-format=docker --location=${{ env.REGION }} --description="Docker repository for LEVI-AI"

      - name: Build and Push Container
        run: |-
          docker build --no-cache -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/levi-repo/${{ env.SERVICE_NAME }}:${{ github.sha }} -f backend/Dockerfile.prod .
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/levi-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy API to Cloud Run (No Traffic)
        id: deploy_api
        env:
          SECRET_KEY: '${{ secrets.SECRET_KEY }}'
          RAZORPAY_KEY_ID: '${{ secrets.RAZORPAY_KEY_ID }}'
          RAZORPAY_KEY_SECRET: '${{ secrets.RAZORPAY_KEY_SECRET }}'
          RAZORPAY_WEBHOOK_SECRET: '${{ secrets.RAZORPAY_WEBHOOK_SECRET }}'
          ADMIN_KEY: '${{ secrets.ADMIN_KEY }}'
          GROQ_API_KEY: '${{ secrets.GROQ_API_KEY }}'
          TOGETHER_API_KEY: '${{ secrets.TOGETHER_API_KEY }}'
          RESEND_API_KEY: '${{ secrets.RESEND_API_KEY }}'
          FIREBASE_PROJECT_ID: '${{ secrets.FIREBASE_PROJECT_ID }}'
          FIREBASE_MESSAGING_SENDER_ID: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}'
          FIREBASE_SERVICE_ACCOUNT_JSON: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}'
          AWS_ACCESS_KEY_ID: '${{ secrets.AWS_ACCESS_KEY_ID }}'
          AWS_SECRET_ACCESS_KEY: '${{ secrets.AWS_SECRET_ACCESS_KEY }}'
          AWS_S3_BUCKET: '${{ secrets.AWS_S3_BUCKET }}'
          REDIS_URL: '${{ secrets.REDIS_URL }}'
          VAPID_PRIVATE_KEY: '${{ secrets.VAPID_PRIVATE_KEY }}'
          VAPID_ADMIN_EMAIL: '${{ secrets.VAPID_ADMIN_EMAIL }}'
          SENTRY_DSN: '${{ secrets.SENTRY_DSN }}'
        run: |-
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/levi-repo/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-traffic \
            --tag=canary \
            --allow-unauthenticated \
            --set-env-vars "^|^ENVIRONMENT=production|GITHUB_SHA=${{ github.sha }}|GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}|SECRET_KEY=$SECRET_KEY|RAZORPAY_KEY_ID=$RAZORPAY_KEY_ID|RAZORPAY_KEY_SECRET=$RAZORPAY_KEY_SECRET|RAZORPAY_WEBHOOK_SECRET=$RAZORPAY_WEBHOOK_SECRET|ADMIN_KEY=$ADMIN_KEY|GROQ_API_KEY=$GROQ_API_KEY|TOGETHER_API_KEY=$TOGETHER_API_KEY|RESEND_API_KEY=$RESEND_API_KEY|FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID|FIREBASE_MESSAGING_SENDER_ID=$FIREBASE_MESSAGING_SENDER_ID|FIREBASE_SERVICE_ACCOUNT_JSON=$FIREBASE_SERVICE_ACCOUNT_JSON|AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID|AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY|AWS_S3_BUCKET=$AWS_S3_BUCKET|REDIS_URL=$REDIS_URL|USE_CELERY=true|VAPID_PRIVATE_KEY=$VAPID_PRIVATE_KEY|VAPID_ADMIN_EMAIL=$VAPID_ADMIN_EMAIL|SENTRY_DSN=$SENTRY_DSN" \
            --port 8080 \
            --format='value(status.url)' > service_url.txt

          echo "SERVICE_URL=$(cat service_url.txt)" >> $GITHUB_ENV
          
          # Fetch the canary (tagged) URL
          CANARY_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --format='value(status.traffic[1].url)' || echo "$(cat service_url.txt)")
          echo "CANARY_URL=$CANARY_URL" >> $GITHUB_ENV

      - name: Deploy Celery Worker to Cloud Run
        id: deploy_worker
        env:
          REDIS_URL: '${{ secrets.REDIS_URL }}'
          FIREBASE_PROJECT_ID: '${{ secrets.FIREBASE_PROJECT_ID }}'
          FIREBASE_SERVICE_ACCOUNT_JSON: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}'
          AWS_ACCESS_KEY_ID: '${{ secrets.AWS_ACCESS_KEY_ID }}'
          AWS_SECRET_ACCESS_KEY: '${{ secrets.AWS_SECRET_ACCESS_KEY }}'
          AWS_S3_BUCKET: '${{ secrets.AWS_S3_BUCKET }}'
          GROQ_API_KEY: '${{ secrets.GROQ_API_KEY }}'
          TOGETHER_API_KEY: '${{ secrets.TOGETHER_API_KEY }}'
          SENTRY_DSN: '${{ secrets.SENTRY_DSN }}'
        run: |-
          gcloud run deploy ${{ env.SERVICE_NAME }}-worker \
            --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/levi-repo/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --command="bash,worker_entrypoint.sh" \
            --no-allow-unauthenticated \
            --set-env-vars "^|^ENVIRONMENT=production|GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}|REDIS_URL=$REDIS_URL|FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID|FIREBASE_SERVICE_ACCOUNT_JSON=$FIREBASE_SERVICE_ACCOUNT_JSON|AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID|AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY|AWS_S3_BUCKET=$AWS_S3_BUCKET|GROQ_API_KEY=$GROQ_API_KEY|TOGETHER_API_KEY=$TOGETHER_API_KEY|USE_CELERY=true|SENTRY_DSN=$SENTRY_DSN|CELERY_CONCURRENCY=4" \
            --port 8080

      - name: Post-Deploy Health Check (Canary)
        run: |
          echo "Verifying deployment at $CANARY_URL..."
          for i in {1..15}; do
            echo "Attempt $i..."
            HEALTH_JSON=$(curl -s -f "$CANARY_URL/health")
            
            echo "Health Response: $HEALTH_JSON"
            
            STATUS=$(echo $HEALTH_JSON | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
            DB_STATUS=$(echo $HEALTH_JSON | grep -o '"database":"[^"]*"' | cut -d'"' -f4)
            AUTH_STATUS=$(echo $HEALTH_JSON | grep -o '"auth":"[^"]*"' | cut -d'"' -f4)
            REMOTE_SHA=$(echo $HEALTH_JSON | grep -o '"version":"[^"]*"' | cut -d'"' -f4)

            if [ "$STATUS" = "ok" ]; then
              echo "âś… Canary is healthy."
              if [[ "$REMOTE_SHA" == *"${{ github.sha }}"* ]] || [ "$REMOTE_SHA" = "local" ]; then
                echo "âś… Version matches or is local."
                exit 0
              else
                echo "âš ď¸Ź Version mismatch (Remote: $REMOTE_SHA, New: ${{ github.sha }}). Waiting..."
              fi
            else
              echo "âťŚ Health check failed: STATUS=$STATUS, DATABASE=$DB_STATUS, AUTH=$AUTH_STATUS"
            fi
            
            sleep 6
          done
          echo "âťŚ Backend health check FAILED after 15 attempts."
          exit 1

      - name: Swap Traffic to New Revision
        if: success()
        run: |
          echo "Routing 100% traffic to latest revision..."
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --to-latest

      - name: Failure Diagnostics (Monitoring)
        if: failure()
        run: |
          echo "--- SERVICE LOGS ---"
          gcloud run services logs read ${{ env.SERVICE_NAME }} --region ${{ env.REGION }} --limit 50
          echo "--- END LOGS ---"
