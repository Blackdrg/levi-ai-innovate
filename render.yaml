services:
  - type: web
    name: backend
    runtime: docker
    dockerfilePath: backend/Dockerfile.prod
    dockerContext: backend
    plan: free
    envVars:
      - key: RENDER
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TRANSFORMERS_CACHE
        value: /app/model_cache

  - type: web
    name: rasa-server
    runtime: docker
    dockerfilePath: rasa/Dockerfile.server
    dockerContext: rasa
    plan: free

  - type: web
    name: rasa-actions
    runtime: docker
    dockerfilePath: rasa/Dockerfile.actions
    dockerContext: rasa
    plan: free
