<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <title>LEVI-AI | Sovereign Marketplace</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050507] text-slate-200 font-['Outfit']">

    <nav class="p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center bg-white/5 sovereign-glass px-8 py-4 rounded-2xl border border-white/10">
            <div class="flex items-center gap-4">
                <span class="text-2xl font-bold tracking-tighter text-neural">LEVI-AI</span>
                <span class="text-[10px] uppercase tracking-[0.3em] text-slate-500 font-bold border-l border-white/10 pl-4">Sovereign Marketplace</span>
            </div>
            <div class="flex gap-8">
                <a href="index.html" class="text-xs uppercase tracking-widest text-slate-400">Home</a>
                <a href="builder.html" class="text-xs uppercase tracking-widest text-slate-400">Architect</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-12 px-6">
        <header class="mb-12">
            <h1 class="text-4xl font-bold mb-4">Discover <span class="text-neural">Intelligence</span></h1>
            <p class="text-slate-400">Install community-vetted agent archetypes into your Sovereign node.</p>
        </header>

        <div id="marketplace-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Market items will manifest here -->
            <div class="animate-pulse sovereign-glass p-8 rounded-3xl border border-white/5">
                <div class="w-12 h-12 bg-white/5 rounded-2xl mb-6"></div>
                <div class="h-4 bg-white/5 rounded w-3/4 mb-4"></div>
                <div class="h-3 bg-white/5 rounded w-1/2"></div>
            </div>
        </div>
    </main>

    <script>
        async function loadMarketplace() {
            try {
                const resp = await fetch('/api/v13/marketplace/browse');
                const agents = await resp.json();
                const grid = document.getElementById("marketplace-grid");
                grid.innerHTML = agents.length ? "" : '<p class="text-slate-500 italic col-span-full text-center">The marketplace is awaiting its first contribution.</p>';
                
                agents.forEach(agent => {
                    const card = document.createElement("div");
                    card.className = "sovereign-glass p-8 rounded-3xl border border-white/10 bg-white/5 hover:bg-white/10 transition-all group";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-6">
                            <span class="material-symbols-outlined text-neural text-4xl">smart_toy</span>
                            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">${agent.category}</span>
                        </div>
                        <h3 class="text-xl font-bold mb-2 group-hover:text-neural transition-colors">${agent.name}</h3>
                        <p class="text-xs text-slate-400 leading-relaxed mb-6 line-clamp-3">${agent.description}</p>
                        <div class="flex justify-between items-center pt-6 border-t border-white/5">
                            <div class="flex items-center gap-2">
                                <span class="material-symbols-outlined text-xs text-slate-500">download</span>
                                <span class="text-[10px] font-bold text-slate-500">${agent.downloads}</span>
                            </div>
                            <button onclick="installAgent(${agent.id})" class="text-[10px] font-bold uppercase tracking-widest text-neural border border-neural/30 px-4 py-2 rounded-lg hover:bg-neural hover:text-white transition-all">Install</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error(err);
            }
        }

        async function installAgent(id) {
            const token = localStorage.getItem("sovereign_token");
            try {
                const resp = await fetch(`/api/v13/marketplace/install/${id}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await resp.json();
                if (data.status === 'success') alert("Agent synced to your collection.");
            } catch (err) { console.error(err); }
        }

        window.onload = loadMarketplace;
    </script>
</body>
</html>
