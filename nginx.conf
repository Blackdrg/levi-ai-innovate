# nginx.conf
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream levi_api {
        server api:8000;
        keepalive 32;
    }

    # --- Global Hardening ---
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # --- API Gateway (api.levi-ai.com) ---
    server {
        listen 443 ssl;
        server_name api.levi-ai.com;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Security Headers (Sovereign v14.1)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; object-src 'none';" always;

        # SSE Optimization
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        tcp_nodelay on;

        location / {
            proxy_pass http://levi_api;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $http_host;
            proxy_read_timeout 300s;
        }

        # v14.0 Cognitive Stream (SSE)
        location ~ ^/api/v(1|13)/chat/stream {
            proxy_pass http://levi_api;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            proxy_read_timeout 600s;
            proxy_buffering off;
            proxy_cache off;
        }
    }

    # --- Frontend APP (app.levi-ai.com) ---
    server {
        listen 443 ssl;
        server_name app.levi-ai.com;

        ssl_certificate /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
