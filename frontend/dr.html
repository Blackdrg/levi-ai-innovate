<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <title>LEVI-AI DR Registry | Sovereign Resilience</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/config.js"></script>
    <script src="js/levi-api.js"></script>
    <script src="js/shared.js"></script>
</head>
<body class="bg-[#050507] text-slate-200 font-['Outfit'] overflow-x-hidden">
    <!-- Sovereign Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 p-6">
        <div class="max-w-6xl mx-auto sovereign-glass px-8 py-4 flex justify-between items-center bg-white/5 border border-white/10">
            <div class="flex items-center gap-4">
                <span class="text-2xl font-bold tracking-tighter text-neural">LEVI-AI</span>
                <span class="text-[10px] uppercase tracking-[0.3em] text-slate-500 font-bold border-l border-white/10 pl-4">DR Registry</span>
            </div>
            <div id="sovereign-nav" class="flex items-center gap-8">
                <!-- Injected via shared.js -->
            </div>
        </div>
    </nav>

    <main class="relative z-10 pt-32 pb-20 px-6 max-w-7xl mx-auto">
        <header class="mb-12">
            <h1 class="text-5xl font-bold tracking-tight text-white mb-4">Disaster <span class="text-neural">Recovery</span></h1>
            <p class="text-slate-400 text-lg leading-relaxed">System state snapshots and RTO monitoring polling /api/v1/dr/status.</p>
        </header>

        <div class="grid lg:grid-cols-2 gap-12">
            <!-- Backup Freshness -->
            <div class="sovereign-glass p-10 bg-white/5 border border-white/10 rounded-[40px] space-y-8">
                <h3 class="text-[10px] uppercase tracking-[0.3em] text-slate-500 font-bold">Backup Freshness (Postgres/Redis/Neo4j)</h3>
                <div id="backup-bars" class="space-y-6">
                    <!-- Progress bars injected here -->
                </div>

                <div class="pt-8 border-t border-white/5 flex items-center justify-between">
                    <div>
                        <h3 class="text-[10px] uppercase tracking-[0.3em] text-slate-500 font-bold mb-1">RTO Recovery Budget</h3>
                        <p id="rto-value" class="text-3xl font-bold text-neural">0s / 300s</p>
                    </div>
                    <span id="resilience-badge" class="px-4 py-2 rounded-full border text-[10px] font-bold tracking-widest uppercase text-emerald-400 border-emerald-500/30 bg-emerald-500/10">Resilient State</span>
                </div>

                <button onclick="triggerDrill()" class="w-full bg-neural text-white py-5 rounded-2xl font-bold uppercase tracking-[0.2em] shadow-[0_0_30px_rgba(168,85,247,0.3)] hover:scale-[1.02] transition-transform flex items-center justify-center gap-3 mt-6">
                    <span class="material-symbols-outlined">restart_alt</span> Initiate Restore Drill
                </button>
            </div>

            <!-- Drill History -->
            <div class="sovereign-glass p-10 bg-white/5 border border-white/10 rounded-[40px]">
                <h3 class="text-[10px] uppercase tracking-[0.3em] text-slate-500 font-bold mb-8">Restore Drill History</h3>
                <div id="drill-history" class="space-y-4">
                    <!-- Drill items injected here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        async function fetchDrStatus() {
            try {
                const data = await LeviAPI.get('/api/v1/dr/status');
                
                // Backup Freshness
                const barsContainer = document.getElementById('backup-bars');
                barsContainer.innerHTML = '';
                Object.entries(data.backups).forEach(([key, val]) => {
                    const freshness = Math.max(0, 100 - (val.age / 3600) * 10); // 10% penalty per hour
                    barsContainer.innerHTML += `
                        <div class="space-y-3">
                            <div class="flex justify-between items-center text-[10px] font-bold uppercase tracking-widest text-slate-400">
                                <span>${key}</span>
                                <span>${val.age}s ago</span>
                            </div>
                            <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
                                <div class="h-full bg-neural" style="width: ${freshness}%"></div>
                            </div>
                        </div>
                    `;
                });

                // RTO
                document.getElementById('rto-value').innerText = `${data.rto_actual}s / 300s Budget`;
                if (data.rto_actual > 300) {
                    document.getElementById('resilience-badge').innerText = 'RTO Violation';
                    document.getElementById('resilience-badge').className = 'px-4 py-2 rounded-full border text-[10px] font-bold tracking-widest uppercase text-rose-400 border-rose-500/30 bg-rose-500/10';
                }

                // History
                const historyContainer = document.getElementById('drill-history');
                historyContainer.innerHTML = '';
                data.drills.forEach(drill => {
                    const statusClass = drill.passed ? 'text-emerald-500' : 'text-rose-500';
                    const icon = drill.passed ? 'check_circle' : 'error';
                    historyContainer.innerHTML += `
                        <div class="p-5 sovereign-glass bg-white/5 border border-white/5 flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <span class="material-symbols-outlined text-sm ${statusClass}">${icon}</span>
                                <div>
                                    <p class="text-xs font-bold text-white uppercase tracking-widest">${drill.id}</p>
                                    <p class="text-[8px] text-slate-500 font-mono">${new Date(drill.timestamp * 1000).toLocaleString()}</p>
                                </div>
                            </div>
                            <span class="${statusClass} text-[10px] font-bold uppercase tracking-widest">${drill.passed ? 'PASSED' : 'FAILED'}</span>
                        </div>
                    `;
                });

            } catch (err) {
                console.error("[DR] Sync failed:", err);
            }
        }

        async function triggerDrill() {
            try {
                await LeviAPI.post('/api/v1/dr/drill', {});
                alert('Restore Drill Initiated.');
                fetchDrStatus();
            } catch (err) {
                console.error("[DR] Drill failed:", err);
            }
        }

        setInterval(fetchDrStatus, 10000);
        fetchDrStatus();
    </script>
</body>
</html>
