<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#09090f">
    <title>LEVI Studio — Visual Synthesis</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        space: '#09090f',
                        gold: {
                            DEFAULT: '#d4af37',
                            light: '#f1e5ac',
                            dark: '#996515',
                        }
                    },
                    fontFamily: {
                        display: ['Cormorant Garamond', 'serif'],
                        sans: ['DM Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #09090f;
            color: #e2e8f0;
            overflow-x: hidden;
        }
    
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.05;
            pointer-events: none;
            z-index: 50;
        }
    
        .glass {
            background: rgba(255, 255, 255, 0.03);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    
        .nav-blur {
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            background: rgba(9, 9, 15, 0.8);
        }
    
        .gold-gradient {
            background: linear-gradient(to right, #d4af37, #f1e5ac, #996515);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    
        /* ── Mobile menu ── */
        #mobile-menu {
            display: none;
            position: fixed;
            top: 80px;
            left: 0;
            right: 0;
            z-index: 39;
            background: rgba(9, 9, 15, 0.97);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px 24px;
        }
    
        #mobile-menu.open {
            display: block;
        }
    
        #mobile-menu a {
            display: block;
            padding: 12px 0;
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.2s;
        }
    
        #mobile-menu a:hover {
            color: #d4af37;
        }
    
        #mobile-menu a:last-child {
            border-bottom: none;
        }
    
        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 200;
            padding: 12px 20px;
            border-radius: 12px;
            background: rgba(26, 26, 46, 0.95);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: #e2e8f0;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
        }
    
        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="font-sans min-h-screen">
    <div class="noise-overlay"></div>
    <div id="toast"></div>

    <!-- Navbar -->
    <nav class="fixed top-0 left-0 w-full z-40 nav-blur border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <a href="index.html" class="font-display text-3xl font-bold gold-gradient tracking-wider">LEVI</a>
            <div class="hidden md:flex items-center space-x-8">
                <a href="index.html"
                    class="text-sm font-medium hover:text-yellow-400 transition-colors text-slate-300">Home</a>
                <a href="chat.html"
                    class="text-sm font-medium hover:text-yellow-400 transition-colors text-slate-300">AI Chat</a>
                <a href="studio.html" class="text-sm font-medium text-yellow-400">Studio</a>
                <a href="feed.html"
                    class="text-sm font-medium hover:text-yellow-400 transition-colors text-slate-300">Feed</a>
                <a href="quotes.html"
                    class="text-sm font-medium hover:text-yellow-400 transition-colors text-slate-300">Explore</a>
                <a href="auth.html" id="nav-auth-btn"
                    class="px-5 py-2 glass rounded-full text-sm font-semibold border border-yellow-400/20 text-yellow-400 hover:bg-yellow-400 hover:text-black transition-all duration-300">
                    Sign In
                </a>
            </div>
            <!-- Hamburger -->
            <button id="hamburger-btn" class="md:hidden text-white p-1" aria-label="Toggle Menu"
                onclick="toggleMobileMenu()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>
    </nav>

    <!-- Mobile menu -->
    <div id="mobile-menu">
        <a href="index.html">Home</a>
        <a href="chat.html">AI Chat</a>
        <a href="studio.html" style="color:#d4af37">Studio</a>
        <a href="feed.html">Feed</a>
        <a href="quotes.html">Explore</a>
        <a href="auth.html">Sign In</a>
    </div>
<main class="pt-40 pb-20 px-6">
    <div class="max-w-5xl mx-auto">

        <!-- Header -->
        <div class="text-center mb-16">
            <h1 class="font-display text-6xl font-bold mb-6 italic gold-gradient">Studio</h1>
            <p class="text-slate-400">Transform your thoughts into visual masterpieces.</p>
        </div>

        <!-- Grid -->
        <div class="grid lg:grid-cols-2 gap-12 items-start">

            <!-- ── Creator Panel ── -->
            <div class="glass p-10 rounded-[3rem] border border-white/10 shadow-2xl">

                <!-- Quote input -->
                <div class="mb-8">
                    <label class="block text-[10px] font-bold tracking-widest uppercase text-slate-500 mb-4 ml-4"
                        for="studio-text">
                        The Wisdom
                    </label>
                    <textarea id="studio-text" placeholder="Enter a quote or a philosophical thought..."
                        class="w-full h-40 bg-black/30 border border-white/10 rounded-3xl px-6 py-6 text-sm focus:outline-none focus:border-yellow-400/30 transition-all resize-none text-slate-200 placeholder-slate-600"></textarea>
                    <!-- Character counter -->
                    <div class="text-right mt-2 mr-2">
                        <span id="char-count" class="text-xs text-slate-600">0 / 300</span>
                    </div>
                </div>

                    <!-- Mood + Author -->
                    <div class="grid grid-cols-2 gap-6 mb-8">
                        <div>
                            <label class="block text-[10px] font-bold tracking-widest uppercase text-slate-500 mb-4 ml-4" for="studio-mood">
                                Mood
                            </label>
                            <select id="studio-mood"
                                class="w-full bg-black/30 border border-white/10 rounded-2xl px-6 py-4 text-sm text-slate-200 focus:outline-none focus:border-yellow-400/30 transition-all appearance-none cursor-pointer">
                                <option value="philosophical">Philosophical</option>
                                <option value="inspiring">Inspiring</option>
                                <option value="stoic">Stoic</option>
                                <option value="zen">Zen</option>
                                <option value="artistic">Artistic</option>
                                <option value="futuristic">Futuristic</option>
                                <option value="melancholic">Melancholic</option>
                                <option value="serene">Serene</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold tracking-widest uppercase text-slate-500 mb-4 ml-4"
                                for="studio-author">
                                Author
                            </label>
                            <input type="text" id="studio-author" placeholder="Optional"
                                class="w-full bg-black/30 border border-white/10 rounded-2xl px-6 py-4 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-yellow-400/30 transition-all">
                        </div>
                    </div>

                    <!-- Error message -->
                    <div id="error-msg"
                        class="hidden mb-4 px-4 py-3 rounded-2xl bg-red-900/20 border border-red-500/20 text-red-400 text-sm"></div>

                    <!-- Generate button -->
                    <button id="generate-btn"
                        class="w-full py-5 bg-yellow-400 text-black font-bold rounded-2xl hover:bg-yellow-300 transition-all shadow-xl shadow-yellow-400/20 transform hover:-translate-y-1 active:translate-y-0 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
                        Synthesize Visual →
                    </button>

                    <!-- Recent hint -->
                    <p class="text-center text-xs text-slate-600 mt-4">Click a gallery quote below to pre-fill</p>

                    <!-- Quick-fill chips -->
                    <div class="flex flex-wrap gap-2 mt-3" id="quick-chips">
                        <button onclick="prefill('The only true wisdom is in knowing you know nothing.','Socrates','philosophical')"
                            class="px-3 py-1 rounded-full text-xs border border-white/10 text-slate-500 hover:border-yellow-400/30 hover:text-yellow-400 transition-all bg-black/20">
                            Socrates
                        </button>
                        <button onclick="prefill('What you seek is seeking you.','Rumi','serene')"
                            class="px-3 py-1 rounded-full text-xs border border-white/10 text-slate-500 hover:border-yellow-400/30 hover:text-yellow-400 transition-all bg-black/20">
                            Rumi
                        </button>
                        <button onclick="prefill('In the middle of difficulty lies opportunity.','Albert Einstein','inspiring')"
                            class="px-3 py-1 rounded-full text-xs border border-white/10 text-slate-500 hover:border-yellow-400/30 hover:text-yellow-400 transition-all bg-black/20">
                            Einstein
                        </button>
                        <button onclick="prefill('Not all those who wander are lost.','J.R.R. Tolkien','artistic')"
                            class="px-3 py-1 rounded-full text-xs border border-white/10 text-slate-500 hover:border-yellow-400/30 hover:text-yellow-400 transition-all bg-black/20">
                            Tolkien
                        </button>
                    </div>
                </div>

                <!-- ── Preview Panel ── -->
                <div
                    class="glass rounded-[3rem] border border-white/10 shadow-2xl aspect-square flex flex-col items-center justify-center relative group overflow-hidden">
                
                    <!-- Placeholder -->
                    <div id="preview-placeholder" class="text-center p-6">
                        <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-6">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-slate-700" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 002-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <p class="text-slate-600 text-sm font-medium tracking-widest uppercase">Visual Preview</p>
                        <p class="text-slate-700 text-xs mt-2">Enter wisdom and click Synthesize</p>
                    </div>

                    <!-- Generated image -->
                    <div id="preview-container" class="hidden w-full h-full relative">
                        <img id="preview-img" src="" alt="Generated Visual" class="w-full h-full object-cover rounded-[2.8rem]">
                    
                        <!-- Hover overlay with actions -->
                        <div
                            class="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity gap-4 rounded-[2.8rem]">
                            <button id="download-btn" class="p-4 bg-white/10 backdrop-blur-md rounded-2xl hover:bg-white/20 transition-all"
                                aria-label="Download Image" title="Download PNG">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                </svg>
                            </button>
                            <button id="share-btn" class="p-4 bg-white/10 backdrop-blur-md rounded-2xl hover:bg-white/20 transition-all"
                                aria-label="Share Image" title="Share">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                                </svg>
                            </button>
                            <button id="regenerate-btn"
                                class="p-4 bg-white/10 backdrop-blur-md rounded-2xl hover:bg-white/20 transition-all"
                                aria-label="Regenerate" title="Regenerate">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Loading overlay -->
                    <div id="studio-loading"
                        class="hidden absolute inset-0 bg-black/70 backdrop-blur-sm flex flex-col items-center justify-center z-20 rounded-[2.8rem]">
                        <div class="animate-spin w-12 h-12 border-4 border-yellow-400 border-t-transparent rounded-full mb-6"></div>
                        <p class="text-yellow-400 font-bold tracking-[0.3em] uppercase text-xs">Synthesizing…</p>
                        <p class="text-slate-500 text-xs mt-2">This may take a few seconds</p>
                    </div>
                    </div>
            </div>
        </div>
    </main>
    
    <script>
            // ── Config (Local dev vs Production) ─────────────────
            const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
            const API_BASE = IS_LOCAL ? 'http://localhost:8000' : '/api';
    
            // ── API Helper ────────────────────────────────────
            async function apiPost(path, body, timeoutMs = 30000) {
                const controller = new AbortController();
                const tid = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const res = await fetch(`${API_BASE}${path}`, {
                        method: 'POST',
                        signal: controller.signal,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    clearTimeout(tid);
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err.detail || `API error: ${res.status}`);
                    }
                    return await res.json();
                } catch (e) {
                    clearTimeout(tid);
                    if (e.name === 'AbortError') throw new Error('Request timed out. Backend may be waking up. Try again.');
                    throw e;
                }
            }
    
            // ── DOM Elements ──────────────────────────────────
            const generateBtn = document.getElementById('generate-btn');
            const textInput = document.getElementById('studio-text');
            const moodInput = document.getElementById('studio-mood');
            const authorInput = document.getElementById('studio-author');
            const loading = document.getElementById('studio-loading');
            const placeholder = document.getElementById('preview-placeholder');
            const container = document.getElementById('preview-container');
            const previewImg = document.getElementById('preview-img');
            const downloadBtn = document.getElementById('download-btn');
            const shareBtn = document.getElementById('share-btn');
            const regenerateBtn = document.getElementById('regenerate-btn');
            const errorMsg = document.getElementById('error-msg');
            const charCount = document.getElementById('char-count');
    
            let lastImageB64 = '';
            let lastText = '';
            let lastAuthor = '';
    
            // ── Character counter ─────────────────────────────
            textInput.addEventListener('input', () => {
                const len = textInput.value.length;
                charCount.textContent = `${len} / 300`;
                charCount.style.color = len > 280 ? '#ef4444' : '';
                if (len > 300) {
                    textInput.value = textInput.value.substring(0, 300);
                }
            });
    
            // ── Utilities ─────────────────────────────────────
            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.classList.remove('hidden');
                setTimeout(() => errorMsg.classList.add('hidden'), 5000);
            }
    
            function showToast(msg) {
                const t = document.getElementById('toast');
                if (!t) return;
                t.textContent = msg;
                t.classList.add('show');
                if (t._tid) clearTimeout(t._tid);
                t._tid = setTimeout(() => t.classList.remove('show'), 3000);
            }
    
            function toggleMobileMenu() {
                const menu = document.getElementById('mobile-menu');
                if (menu) menu.classList.toggle('open');
            }
    
            function prefill(text, author, mood) {
                textInput.value = text;
                authorInput.value = author;
                moodInput.value = mood;
                charCount.textContent = `${text.length} / 300`;
                textInput.focus();
            }
    
            // ── Main Generate Function ────────────────────────
            async function generate() {
                const text = textInput.value.trim();
                const author = authorInput.value.trim();
                const mood = moodInput.value;
    
                if (!text) {
                    showError('Please enter some wisdom to visualize.');
                    textInput.focus();
                    return;
                }
    
                generateBtn.disabled = true;
                generateBtn.textContent = 'Synthesizing...';
                loading.classList.remove('hidden');
                errorMsg.classList.add('hidden');
    
                try {
                    const data = await apiPost('/generate_image', { text, author, mood });
                    const b64 = data.image_b64 || data.image;
                    if (!b64) throw new Error('Backend returned no image data.');
    
                    const src = b64.startsWith('data:') ? b64 : `data:image/png;base64,${b64}`;
                    previewImg.src = src;
                    lastImageB64 = src;
                    lastText = text;
                    lastAuthor = author;
    
                    placeholder.classList.add('hidden');
                    container.classList.remove('hidden');
                    showToast('✨ Visual synthesized!');
                } catch (err) {
                    console.error(err);
                    showError(`Synthesis failed: ${err.message}`);
                    showToast('⚠️ Failed to generate');
                } finally {
                    loading.classList.add('hidden');
                    generateBtn.disabled = false;
                    generateBtn.textContent = 'Synthesize Visual →';
                }
            }
    
            // ── Button wiring ─────────────────────────────────
            generateBtn.addEventListener('click', generate);
            regenerateBtn.addEventListener('click', generate);
    
            downloadBtn.addEventListener('click', () => {
                if (!lastImageB64) return;
                const a = document.createElement('a');
                a.href = lastImageB64;
                a.download = `levi-wisdom-${Date.now()}.png`;
                a.click();
                showToast('📥 Downloading...');
            });
    
            shareBtn.addEventListener('click', async () => {
                if (!lastImageB64) return;
                try {
                    const response = await fetch(lastImageB64);
                    const blob = await response.blob();
                    const file = new File([blob], 'levi-wisdom.png', { type: 'image/png' });
    
                    if (navigator.share) {
                        await navigator.share({
                            title: 'LEVI AI — Visual Wisdom',
                            text: `"${lastText}" — ${lastAuthor || 'LEVI AI'}`,
                            files: [file]
                        });
                    } else {
                        await navigator.clipboard.writeText(`"${lastText}" — ${lastAuthor || 'LEVI AI'}\n\nGenerated by LEVI AI: ${location.href}`);
                        showToast('🔗 Quote text copied to clipboard!');
                    }
                } catch (e) {
                    console.error(e);
                    showToast('❌ Share failed');
                }
            });
    
            // ── Auth nav ──────────────────────────────────────
            try {
                const user = localStorage.getItem('levi_user');
                if (user) {
                    const aun = t.getElementById('nav-auth-btn');
                    if (authBtn) {
                        authBtn.innerText = user;
                        authBtn.href = 'my-gallery.html';
                    }
                }
            } catch (e) { /* localStorage blocked */ }
    
            // ── Keyboard shortcut ─────────────────────────────
            document.addEventListener('keydown', e => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    generate();
                }
            });
    </script>
</body>
</html>
