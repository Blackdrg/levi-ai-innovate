name: LEVI-AI Production Readiness Graduation (v14.1.0)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality-gate:
    name: "🛡️ Stage 1: Quality & Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-asyncio
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
      - name: Lint with Ruff
        run: ruff check .
      - name: Type check with Mypy
        run: mypy backend/

  unit-gate:
    name: "🧪 Stage 2: Unit Testing"
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run Unit Tests
        run: pytest backend/tests/unit

  integration-chaos-gate:
    name: "🧬 Stage 3: Integration & Chaos Drills"
    needs: unit-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Chaos DCN Tests
        run: pytest tests/integration/test_chaos_dcn.py
      - name: Run Agent E2E Suite
        run: pytest tests/integration/agents/test_agents_e2e.py

  security-gate:
    name: "🔒 Stage 4: Security Remediation & Scans"
    needs: integration-chaos-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Bandit (Sast)
        run: pip install bandit && bandit -r backend/ -ll
      - name: Build temporary image for Trivy
        run: docker build -f backend/Dockerfile.v8 -t levi-ai:security-test .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'levi-ai:security-test'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
      - name: Run ARCA Red-Teaming
        run: python -m backend.core.v8.arca --simulate-all-categories

  frontend-e2e-gate:
    name: "🖼️ Stage 5: Playwright E2E"
    needs: integration-chaos-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: cd levi-frontend && npm install
      - name: Install Playwright Browsers
        run: cd levi-frontend && npx playwright install --with-deps
      - name: Run Playwright tests
        run: cd levi-frontend && npx playwright test

  graduation-deploy:
    name: "🚀 Stage 6: Staging Deployment"
    needs: [security-gate, frontend-e2e-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile.v8
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: Deploy to Staging (K8s)
        run: |
          # Example kubectl rollout for staging environment
          echo "Simulating K8s rollout to staging cluster..."
          # kubectl apply -f backend/deployment/kubernetes/
