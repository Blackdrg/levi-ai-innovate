<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path Lost — LEVI</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Plus+Jakarta+Sans:wght@200..800&display=swap"
        rel="stylesheet" />
    <style>
        body {
            background: #131317;
            color: #e5e1e7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }
    
      .container {
        text-align: center;
        padding: 4rem 2rem;
        position: relative;
        z-index: 1;
      }
    
      .error-code {
        font-family: 'Newsreader', serif;
        font-style: italic;
        font-size: 8rem;
        line-height: 1;
        margin-bottom: 1rem;
        background: linear-gradient(to bottom, #f2ca50, transparent);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        opacity: 0.5;
      }
    
      .title {
        font-family: 'Newsreader', serif;
        font-style: italic;
        font-size: 2.5rem;
        margin-bottom: 1.5rem;
        color: #f2ca50;
      }
    
      .subtitle {
        color: #94a3b8;
        margin-bottom: 3rem;
        font-weight: 300;
        line-height: 1.6;
        max-width: 320px;
        margin-left: auto;
        margin-right: auto;
      }
    
      .btn-ghost {
        border: 0.5px solid rgba(242, 202, 80, 0.3);
        color: #f2ca50;
        padding: 1rem 2.5rem;
        border-radius: 9999px;
        font-weight: bold;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.75rem;
        transition: all 0.3s;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        font-size: 0.7rem;
      }
    
      .btn-ghost:hover {
        background: rgba(242, 202, 80, 0.05);
        border-color: #f2ca50;
        transform: translateY(-2px);
      }

      .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(100px);
        z-index: 0;
        opacity: 0.05;
      }
      .orb-delay { animation-delay: 2s; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 overflow-hidden">
    <div class="orb w-96 h-96 bg-primary top-[-10%] left-[-10%] animate-pulse"></div>
    <div class="orb w-80 h-80 bg-secondary bottom-[-10%] right-[-10%] animate-pulse orb-delay"></div>

    <div class="container">
        <div class="error-code">404</div>
        <h1 class="title">Path Not Found</h1>
        <p class="subtitle">
            The wisdom you seek has drifted beyond the current horizon.
        </p>
        <a href="index.html" class="btn-ghost">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Return to Origin
            </a>
    </div>
<script src="js/animations.js" type="module"></script>
<script src="js/feedback.js" type="module"></script>
<script src="js/auth-manager.js"></script>
</body>
</html>
