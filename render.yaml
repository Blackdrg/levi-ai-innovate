services:
  - type: web
    name: backend
    runtime: docker
    dockerfilePath: backend/Dockerfile.prod
    dockerContext: .
    plan: free
    healthCheckPath: /health
    preDeployCommand: python seed.py
    envVars:
      - key: RENDER
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://levi-ai.vercel.app"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TRANSFORMERS_CACHE
        value: /app/model_cache
      - key: CLIENT_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: "info"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: PORT
        value: "10000"

  - type: cron
    name: daily-wisdom-email
    runtime: python
    plan: free
    schedule: "0 9 * * *" # Every day at 9 AM UTC
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && python cron_daily_wisdom.py"
    envVars:
      - key: DATABASE_URL
        fromService:
          type: dpg
          name: levi-db
          property: connectionString
      - key: RESEND_API_KEY
        sync: false
