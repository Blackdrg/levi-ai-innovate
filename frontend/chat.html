<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <title>LEVI-AI Sovereign OS | Intelligent Dialogue</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Sovereign Design System & Assets -->
    <link rel="stylesheet" href="./css/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet" />
    
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    
    <!-- Sovereign Core -->
    <script src="js/config.js"></script>
    <script src="js/levi-api.js"></script>
    <script src="js/shared.js"></script>
</head>

<body class="bg-[#050507] text-slate-200 font-['Outfit'] overflow-hidden">

    <!-- Spectral Orbs -->
    <div class="fixed top-[-10%] left-[-10%] w-[600px] h-[600px] bg-indigo-500/10 blur-[120px] rounded-full pointer-events-none z-0"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-purple-500/10 blur-[120px] rounded-full pointer-events-none z-0"></div>

    <!-- Sovereign Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 p-6">
        <div class="max-w-6xl mx-auto sovereign-glass px-8 py-4 flex justify-between items-center bg-white/5 border border-white/10">
            <div class="flex items-center gap-4">
                <span class="text-2xl font-bold tracking-tighter text-neural">LEVI-AI</span>
                <span class="text-[10px] uppercase tracking-[0.3em] text-slate-500 font-bold border-l border-white/10 pl-4">Sovereign OS v7</span>
            </div>
            <div id="sovereign-nav" class="flex items-center gap-8">
                <!-- Injected via shared.js -->
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden md:flex flex-col items-end">
                    <span class="text-[10px] text-emerald-400 uppercase font-bold tracking-widest">Neural Link Active</span>
                    <span id="session-id" class="text-[8px] text-slate-600 font-mono">PULSE_7A2...</span>
                </div>
                <div class="w-10 h-10 rounded-full bg-neural p-[2px]">
                    <div class="w-full h-full rounded-full bg-[#050507] flex items-center justify-center">
                        <span class="material-symbols-outlined text-neural text-lg">bolt</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Dialogue Interface -->
    <main class="relative z-10 pt-24 h-screen flex flex-col max-w-5xl mx-auto px-6">
        
        <!-- Neural Stream -->
        <div id="messages" class="flex-1 overflow-y-auto pr-4 scrollbar-hide pt-8 space-y-2">
            <!-- Initial Welcome -->
            <div class="flex justify-start mb-6">
                <div class="sovereign-glass p-5 rounded-2xl rounded-tl-none text-sm max-w-[85%] border border-white/5">
                    <p class="text-slate-300 leading-relaxed">Celestial link established. I am **LEVI** — the Sovereign OS. Your vision is my mission. What shall we manifest today?</p>
                </div>
            </div>
        </div>

        <!-- Strategic Input -->
        <div class="pb-10 pt-6">
            <div class="sovereign-glass p-1 bg-white/5 border border-white/10 rounded-[32px] shadow-2xl">
                <div class="flex items-end p-2 gap-4">
                    <button class="w-12 h-12 rounded-full hover:bg-white/5 transition-colors flex items-center justify-center text-slate-400">
                        <span class="material-symbols-outlined">attach_file</span>
                    </button>
                    <textarea id="chat-input" 
                        class="flex-1 bg-transparent border-none text-slate-100 py-3 text-base focus:ring-0 placeholder:text-slate-600 resize-none min-h-[50px] max-h-[200px]"
                        placeholder="Define your vision..."
                        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();dispatchMission();}"></textarea>
                    <button onclick="dispatchMission()" 
                        class="w-12 h-12 rounded-full bg-neural flex items-center justify-center text-white shadow-[0_0_20px_rgba(168,85,247,0.4)] hover:scale-105 transition-transform">
                        <span class="material-symbols-outlined">send</span>
                    </button>
                </div>
            </div>
            <div class="flex justify-center mt-4 gap-6">
                <span class="text-[10px] text-slate-600 uppercase tracking-widest font-bold flex items-center gap-1">
                    <span class="material-symbols-outlined text-[12px]">security</span> Multi-Agent Consensus
                </span>
                <span class="text-[10px] text-slate-600 uppercase tracking-widest font-bold flex items-center gap-1">
                    <span class="material-symbols-outlined text-[12px]">database</span> Semantic Vault Active
                </span>
            </div>
        </div>

        <!-- Mission Graph Overlay (Cytoscape) -->
        <div id="mission-graph-panel" class="fixed right-6 top-32 w-80 h-[500px] sovereign-glass rounded-3xl border border-white/10 hidden flex flex-col overflow-hidden">
            <div class="p-4 border-b border-white/10 bg-white/5 flex justify-between items-center">
                <span class="text-[10px] uppercase tracking-widest font-bold text-neural">Mission Task Graph</span>
                <button onclick="document.getElementById('mission-graph-panel').classList.add('hidden')" class="text-slate-500 hover:text-white transition-colors">
                    <span class="material-symbols-outlined text-sm">close</span>
                </button>
            </div>
            <div id="cy-container" class="flex-1 w-full bg-[#050507]/40"></div>
        </div>
    </main>

    <!-- Sovereign Scripts -->
    <script src="./js/chat.js"></script>
    <script>
        // Adjust session ID in UI
        document.getElementById("session-id").innerText = localStorage.getItem("sovereign_session_id") || "PULSE_UNKNOWN";
    </script>
</body>
</html>
