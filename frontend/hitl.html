<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <title>LEVI-AI HITL Queue | Sovereign Approval</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/config.js"></script>
    <script src="js/levi-api.js"></script>
    <script src="js/shared.js"></script>
</head>
<body class="bg-[#050507] text-slate-200 font-['Outfit'] overflow-x-hidden">
    <!-- Sovereign Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 p-6">
        <div class="max-w-6xl mx-auto sovereign-glass px-8 py-4 flex justify-between items-center bg-white/5 border border-white/10">
            <div class="flex items-center gap-4">
                <span class="text-2xl font-bold tracking-tighter text-neural">LEVI-AI</span>
                <span class="text-[10px] uppercase tracking-[0.3em] text-slate-500 font-bold border-l border-white/10 pl-4">HITL Queue</span>
            </div>
            <div id="sovereign-nav" class="flex items-center gap-8">
                <!-- Injected via shared.js -->
            </div>
        </div>
    </nav>

    <main class="relative z-10 pt-32 pb-20 px-6 max-w-7xl mx-auto">
        <header class="mb-12">
            <h1 class="text-5xl font-bold tracking-tight text-white mb-4">Internal <span class="text-neural">Consensus</span></h1>
            <p class="text-slate-400 text-lg leading-relaxed">Human-in-the-loop approval queue consuming /api/v1/hitl/pending.</p>
        </header>

        <div id="hitl-queue" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- HITL items will manifest here -->
            <div class="col-span-full p-20 text-center sovereign-glass bg-white/3 border border-white/5 italic text-slate-600">No pending approvals in the queue.</div>
        </div>
    </main>

    <script>
        async function fetchPendingHITL() {
            try {
                const data = await LeviAPI.get('/api/v1/hitl/pending');
                const queue = document.getElementById('hitl-queue');
                if (data.length === 0) {
                    queue.innerHTML = '<div class="col-span-full p-20 text-center sovereign-glass bg-white/3 border border-white/5 italic text-slate-600">No pending approvals in the queue.</div>';
                    return;
                }
                queue.innerHTML = '';

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'sovereign-glass p-8 bg-white/5 border border-white/10 rounded-[32px] flex flex-col gap-6 animate-in';
                    const ttlClass = item.ttl < 300 ? 'text-rose-500 font-bold' : 'text-slate-500';
                    card.innerHTML = `
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] uppercase tracking-widest text-neural font-bold">${item.agent_id}</span>
                            <span class="text-[10px] uppercase tracking-widest ${ttlClass}">${item.ttl}s remaining</span>
                        </div>
                        <div class="space-y-4">
                            <h3 class="text-xs text-slate-400 uppercase tracking-widest">Input Payload</h3>
                            <pre class="bg-black/40 p-4 rounded-xl text-[10px] text-slate-300 overflow-x-auto font-mono max-h-40">${JSON.stringify(item.payload, null, 2)}</pre>
                        </div>
                        <div class="flex gap-4 mt-auto">
                            <button onclick="approveHITL('${item.id}', true)" class="flex-1 bg-neural text-white py-4 rounded-2xl font-bold uppercase tracking-widest shadow-[0_0_20px_rgba(168,85,247,0.3)] hover:scale-[1.02] transition-transform flex items-center justify-center gap-2">
                                <span class="material-symbols-outlined text-sm">check_circle</span> Approve
                            </button>
                            <button onclick="approveHITL('${item.id}', false)" class="flex-1 border border-white/10 text-slate-400 py-4 rounded-2xl font-bold uppercase tracking-widest hover:bg-white/5 transition-all flex items-center justify-center gap-2">
                                <span class="material-symbols-outlined text-sm">cancel</span> Reject
                            </button>
                        </div>
                    `;
                    queue.appendChild(card);
                });
            } catch (err) {
                console.error("[HITL] Sync failed:", err);
            }
        }

        async function approveHITL(id, approved) {
            try {
                await LeviAPI.post(`/api/v1/hitl/approve/${id}`, { approved });
                fetchPendingHITL();
            } catch (err) {
                console.error("[HITL] Action failed:", err);
            }
        }

        setInterval(fetchPendingHITL, 5000);
        fetchPendingHITL();
    </script>
</body>
</html>
