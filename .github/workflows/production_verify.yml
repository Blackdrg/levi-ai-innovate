name: Production Hardening Verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Daily 24-hour check

jobs:
  verify:
    runs-on: [self-hosted, gpu, windows] # Target the user's local-first GPU environment
    
    steps:
    - uses: actions/checkout@v3

    - name: Set Environment
      run: |
        copy .env.example .env
        echo "CARGO_HOME=D:/LEVI-AI/.cargo" >> .env
        echo "RUSTUP_HOME=D:/LEVI-AI/.rustup" >> .env

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install maturin opentelemetry-api opentelemetry-sdk prometheus_client

    - name: Compile Native Kernel
      working-directory: backend/kernel
      run: |
        maturin develop

    - name: Run Integration Matrix
      run: |
        pytest tests/integration/test_matrix_v22.py -v

    - name: Execution Soak Test (1 Hour)
      run: |
        python scripts/soak_test.py --duration 1

    - name: Forensic Audit
      run: |
        python backend/levi_cli.py doctor
