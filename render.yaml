services:
  - type: web
    name: backend
    runtime: docker
    dockerfilePath: backend/Dockerfile.prod
    dockerContext: .
    plan: free
    healthCheckPath: /health
    preDeployCommand: "cd backend && alembic upgrade head && python seed.py"
    envVars:
      - key: RENDER
        value: "true"
      - key: DATABASE_URL
        fromService:
          type: pgsql
          name: levi-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: USE_CELERY
        value: "true"
      - key: CORS_ORIGINS
        value: "https://levi-ai.vercel.app"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TRANSFORMERS_CACHE
        value: /app/model_cache
      - key: ADMIN_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: "1"
      - key: PORT
        value: "10000"

  - type: cron
    name: daily-wisdom-email
    runtime: python
    plan: free
    schedule: "0 9 * * *" # Every day at 9 AM UTC
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && python cron_daily_wisdom.py"
    envVars:
      - key: DATABASE_URL
        fromService:
          type: pgsql
          name: levi-db
          property: connectionString
      - key: RESEND_API_KEY
        sync: false
      - key: USE_CELERY
        value: "true"

  - type: worker
    name: celery-worker
    runtime: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && celery -A tasks worker --beat --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromService:
          type: pgsql
          name: levi-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: USE_CELERY
        value: "true"
      - key: GROQ_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: RESEND_API_KEY # Sync RESEND_API_KEY for emails in tasks
        sync: false

databases:
  - name: levi-db
    plan: free
