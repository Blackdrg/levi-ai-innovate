version: '3.8'

services:

  api:
    build:
      context: ./
      dockerfile: backend/Dockerfile.v8
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://levi:levi@postgres:5432/levi_db
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend/data:/app/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: levi
      POSTGRES_PASSWORD: levi
      POSTGRES_DB: levi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  worker:
    build:
      context: ./
      dockerfile: backend/Dockerfile.v8
    command: celery -A backend.celery_app worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

volumes:
  postgres_data:
