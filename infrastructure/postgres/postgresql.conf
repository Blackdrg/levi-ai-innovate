# infrastructure/postgres/postgresql.conf

# 🛡️ Sovereign Hardening: WAL Archiving for PITR
wal_level = replica
archive_mode = on
archive_command = 'cp %p /vault/backups/wal/%f'
archive_timeout = 300   # Force WAL segment every 5 minutes

# Performance Logic for v13.1.0-Hardened-PROD
max_connections = 100
shared_buffers = 128MB
dynamic_shared_memory_type = posix
log_timezone = 'UTC'
datestyle = 'iso, mdy'
timezone = 'UTC'
default_text_search_config = 'pg_catalog.english'
