<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#09090f">
    <title>LEVI Auth — Join the Wisdom Circle</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
        rel="stylesheet">
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        space: '#09090f',
                        indigo: {
                            950: '#1e1b4b',
                            900: '#312e81',
                            800: '#3730a3',
                        },
                        gold: {
                            DEFAULT: '#d4af37',
                            light: '#f1e5ac',
                            dark: '#996515',
                        }
                    },
                    fontFamily: {
                        display: ['Cormorant Garamond', 'serif'],
                        sans: ['DM Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #09090f;
            color: #e2e8f0;
            overflow-x: hidden;
        }
    
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.05;
            pointer-events: none;
            z-index: 50;
        }
    
        .glass {
            background: rgba(255, 255, 255, 0.03);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    
        .gold-gradient {
            background: linear-gradient(to right, #d4af37, #f1e5ac, #996515);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="font-sans min-h-screen flex items-center justify-center px-6">
    <div class="noise-overlay"></div>
    <div class="max-w-md w-full relative">
        <!-- Back link -->
        <a href="index.html"
            class="absolute -top-12 left-0 text-sm text-slate-500 hover:text-gold transition-colors flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to Home
        </a>

        <div class="glass p-10 rounded-[3rem] border border-white/10 shadow-2xl relative overflow-hidden">
            <div class="text-center mb-10">
                <a href="index.html" class="font-display text-4xl font-bold gold-gradient tracking-wider mb-6 block">LEVI</a>
                <h2 id="auth-title" class="text-2xl font-bold mb-2">Welcome Back</h2>
                <p id="auth-subtitle" class="text-slate-400 text-sm">Enter your details to continue your journey.</p>
            </div>

            <form id="auth-form" class="space-y-6">
                <div>
                    <label for="username"
                        class="block text-[10px] font-bold tracking-widest uppercase text-slate-500 mb-2 ml-4">Username</label>
                    <input type="text" id="username" required
                        class="w-full bg-space/50 border border-white/10 rounded-2xl px-6 py-4 text-sm focus:outline-none focus:border-gold/30 transition-all">
                </div>
                <div>
                    <label for="password"
                        class="block text-[10px] font-bold tracking-widest uppercase text-slate-500 mb-2 ml-4">Password</label>
                    <input type="password" id="password" required
                        class="w-full bg-space/50 border border-white/10 rounded-2xl px-6 py-4 text-sm focus:outline-none focus:border-gold/30 transition-all">
                </div>
                
                <div id="auth-message" class="hidden text-xs py-3 px-4 rounded-xl text-center"></div>
                
                <button type="submit" id="submit-btn"
                    class="w-full py-4 bg-gold text-space font-bold rounded-2xl hover:bg-gold-light transition-all shadow-xl shadow-gold/20 transform hover:-translate-y-1">
                    Login →
                </button>
            </form>

            <div class="mt-8 text-center text-sm text-slate-500">
                <p id="toggle-text">Don't have an account? <button onclick="toggleAuthMode()"
                        class="text-gold font-bold hover:underline">Create Account</button></p>
            </div>
        </div>
        </div>

    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
