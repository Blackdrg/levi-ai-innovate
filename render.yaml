services:
  - type: web
    name: backend
    runtime: docker
    dockerfilePath: backend/Dockerfile.prod
    dockerContext: backend
    plan: free
    envVars:
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        fromDatabase:
          name: levi-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: levi-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TRANSFORMERS_CACHE
        value: /app/model_cache

  - type: web
    name: rasa-server
    runtime: docker
    dockerfilePath: rasa/Dockerfile.server
    dockerContext: rasa
    plan: free

  - type: web
    name: rasa-actions
    runtime: docker
    dockerfilePath: rasa/Dockerfile.actions
    dockerContext: rasa
    plan: free

databases:
  - name: levi-db
    plan: free

redis:
  - name: levi-redis
    plan: free
