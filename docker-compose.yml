# docker-compose.yml
version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: levi
      POSTGRES_PASSWORD: levi_password
      POSTGRES_DB: levi_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U levi -d levi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/levi_pass_graph
      - NEO4J_PLUGINS=["apoc"]
    healthcheck:
      test: ["CMD", "cypher-shell", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  mongodb:
    image: mongo:6
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin_password
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-alpha:
    build: .
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://levi:levi_password@postgres:5432/levi_db
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URI=mongodb://admin:admin_password@mongodb:27017
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=levi_pass_graph
      - DCN_NODE_ID=node-us-east-alpha
      - DCN_REGION=us-east-1
      - DCN_SECRET=super_secret_dcn_token_32_chars_long_12345
      - ENVIRONMENT=development
      - MAX_CONCURRENT_MISSIONS=10
    depends_on:
      - redis
      - postgres
      - neo4j
      - mongodb
    ports:
      - "8001:8000"
      - "9001:9000"

  api-bravo:
    build: .
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://levi:levi_password@postgres:5432/levi_db
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URI=mongodb://admin:admin_password@mongodb:27017
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=levi_pass_graph
      - DCN_NODE_ID=node-us-east-bravo
      - DCN_REGION=us-east-1
      - DCN_SECRET=super_secret_dcn_token_32_chars_long_12345
      - ENVIRONMENT=development
    depends_on:
      - redis
      - postgres
      - neo4j
    ports:
      - "8002:8000"
      - "9002:9000"

  dashboard:
    build:
      context: ./frontend_react
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8001
    depends_on:
      - api-alpha

  prometheus:
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
