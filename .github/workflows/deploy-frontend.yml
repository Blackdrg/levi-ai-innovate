name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches:
      - master

    paths:
      - 'frontend/**'
      - 'firebase.json'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm install
        working-directory: frontend

      - name: Build Assets
        run: npm run build
        working-directory: frontend

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_LEVI_AI_C23C6 }}'
          channelId: live
          projectId: levi-ai-c23c6

      - name: Verify Frontend Status
        run: |
          echo "Verifying Hosting at https://levi-ai-c23c6.web.app ..."
          # Max retries: 5, Wait: 5s
          for i in {1..5}; do
            echo "Attempt $i..."
            curl -f https://levi-ai-c23c6.web.app && exit 0
            echo "Frontend check failed, retrying in 5 seconds..."
            sleep 5
          done
          echo "Frontend verification FAILED"
          exit 1
