name: Sovereign OS v8 Graduation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify:
    name: Cognitive Mission Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
      - name: Run v8 Core Tests
        run: |
          python backend/tests/test_v8_core.py
      - name: Static Analysis
        run: |
          pip install ruff
          ruff check .

  build-and-deploy:
    name: Sovereign Monolith Deployment
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Unified v8 Image
        run: |
          docker build -t sovereign-monolith:v8 -f backend/Dockerfile.v8 .
      - name: Push to Sovereign Registry
        run: |
          # Example: docker push logic here
          echo "Image build successful. Ready for graduation deployment."
      - name: Finalize Graduation
        run: |
          echo "Sovereign OS v8 has successfully graduated to production."
