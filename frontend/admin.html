<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <title>LEVI-AI Admin | Sovereignty Monitor</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/config.js"></script>
    <script src="js/levi-api.js"></script>
    <script src="js/shared.js"></script>
    <style>
        .glass { background: rgba(19,19,23,0.72); -webkit-backdrop-filter: blur(24px); backdrop-filter: blur(24px); }
        .gold-text { background: linear-gradient(135deg, #f2ca50 0%, #d4af37 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-card { background: rgba(27,27,31,0.6); border: 0.5px solid rgba(255,255,255,0.08); transition: all 0.3s ease; }
        .stat-card:hover { border-color: rgba(242,202,80,0.3); transform: translateY(-2px); }
    </style>
</head>
<body class="bg-[#050507] text-slate-200 font-['Outfit']">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-20 lg:w-64 border-r border-white/5 flex flex-col items-center lg:items-start p-6 bg-[#08080a]">
            <div class="mb-12 flex items-center gap-4 px-2">
                <div class="w-10 h-10 bg-neural rounded-xl flex items-center justify-center">
                    <span class="material-symbols-outlined text-white">shield_person</span>
                </div>
                <span class="hidden lg:block text-xl font-bold tracking-tighter">LEVI-AI</span>
            </div>
            
            <nav class="flex-1 space-y-4 w-full" id="admin-nav">
                <!-- Nav items injected via shared.js -->
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-8 lg:p-12">
            <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 mb-12">
                <div>
                    <h1 class="text-4xl font-bold tracking-tight mb-2">System <span class="neural-text">Sovereignty</span></h1>
                    <p class="text-slate-500 text-sm">Real-time telemetry and cognitive node health monitor.</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="checkHealth()" class="px-6 py-3 rounded-xl border border-white/10 text-sm font-bold flex items-center gap-2 hover:bg-white/5 transition-all">
                        <span class="material-symbols-outlined text-sm">sync</span> REFRESH PULSE
                    </button>
                </div>
            </header>

            <!-- Stats Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12" id="stats-container">
                <div class="stat-card p-8 rounded-[32px] glass">
                    <p class="text-[10px] uppercase tracking-[0.3em] text-slate-500 font-bold mb-4">VRAM Pressure</p>
                    <div class="flex items-end gap-3">
                        <span id="vram-total" class="text-3xl font-bold">0.00</span>
                        <span class="text-xs text-slate-500 mb-1">GB</span>
                    </div>
                    <div class="w-full h-1 bg-white/5 mt-4 rounded-full overflow-hidden">
                        <div id="vram-bar" class="h-full bg-neural w-0"></div>
                    </div>
                </div>
                <!-- Other stats injected dynamically -->
            </div>

            <!-- Health Cards -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8" id="health-grid">
                <!-- Dynamic cards -->
            </div>
        </main>
    </div>

    <script>
        async function checkHealth() {
            try {
                const data = await LeviAPI.get('/api/v1/brain/pulse');
                
                // VRAM
                const used = data.vram_pressure * 24; // Assuming 24GB total for display
                document.getElementById('vram-total').innerText = used.toFixed(2);
                document.getElementById('vram-bar').style.width = `${data.vram_pressure * 100}%`;
                
                // DCN Health
                const grid = document.getElementById('health-grid');
                grid.innerHTML = `
                    <div class="stat-card p-10 rounded-[40px] glass">
                        <h3 class="text-xs uppercase tracking-widest text-neural font-bold mb-8">DCN Consensus Cluster</h3>
                        <div class="space-y-6">
                            <div class="flex justify-between items-center pb-6 border-b border-white/5">
                                <span class="text-slate-500 text-sm">Node Role</span>
                                <span class="font-bold text-white px-3 py-1 bg-neural/10 rounded-lg">${data.dcn_health.role}</span>
                            </div>
                            <div class="flex justify-between items-center pb-6 border-b border-white/5">
                                <span class="text-slate-500 text-sm">Peers Online</span>
                                <span class="font-bold text-white">${data.dcn_health.peers} Nodes</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="text-slate-500 text-sm">Consensus Term</span>
                                <span class="font-bold text-white">${data.dcn_health.term}</span>
                            </div>
                        </div>
                    </div>

                    <div class="stat-card p-10 rounded-[40px] glass">
                        <h3 class="text-xs uppercase tracking-widest text-neural font-bold mb-8">System Resource Load</h3>
                        <div class="space-y-8">
                            <div class="space-y-4">
                                <div class="flex justify-between items-center text-xs">
                                    <span class="text-slate-500">GPU Orchestration</span>
                                    <span class="text-white">${(data.vram_pressure * 100).toFixed(0)}%</span>
                                </div>
                                <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
                                    <div class="h-full bg-neural" style="width: ${data.vram_pressure * 100}%"></div>
                                </div>
                            </div>
                            <div class="space-y-4">
                                <div class="flex justify-between items-center text-xs">
                                    <span class="text-slate-500">Memory Resonance</span>
                                    <span class="text-white">NOMINAL</span>
                                </div>
                                <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
                                    <div class="h-full bg-emerald-500" style="width: 100%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

            } catch (err) {
                console.error("[Admin] Pulse check failed:", err);
            }
        }

        setInterval(checkHealth, 5000);
        checkHealth();
    </script>
</body>
</html>
