version: '3.8'

services:

  api:
    container_name: levi_monolith_api
    build:
      context: ./
      dockerfile: backend/Dockerfile.v8
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://levi:levi@postgres:5432/levi_db
      - DCN_SYNC_HUB=https://sync.levi-ai.com
      - SWARM_SYNC_KEY=graduated_v13_resonance
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/data:/app/backend/data
    deploy:
      resources:
        limits:
          cpus: '4.0' # Increased for v13.0 Parallel Consensus
          memory: 8G
    restart: unless-stopped

  # ... other services ...

  worker:
    container_name: levi_monolith_worker
    build:
      context: ./
      dockerfile: backend/Dockerfile.v8
    command: celery -A backend.celery_app worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://levi:levi@postgres:5432/levi_db
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
