apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: levi-brain-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: levi-brain-v12
  minReplicas: 2
  maxReplicas: 10
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30 # v14.0: Faster reactive scaling for burst missions
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 25
        periodSeconds: 60
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60 # v14.0 Hardening: Scale earlier for LLM bursts
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
