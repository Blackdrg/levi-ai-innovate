apiVersion: apps/v1
kind: Deployment
metadata:
  name: levi-worker
  namespace: sovereign
spec:
  replicas: 2
  selector:
    matchLabels:
      app: levi-worker
  template:
    metadata:
      labels:
        app: levi-worker
    spec:
      containers:
      - name: worker
        image: gcr.io/levi-ai/worker:v13.0.0
        command: ["celery", "-A", "backend.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
        envFrom:
        - secretRef:
            name: levi-secrets
        - configMapRef:
            name: levi-config
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "8Gi" # Higher for heavy agent tasks
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 10"]
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: levi-worker
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: levi-worker-hpa
  namespace: sovereign
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: levi-worker
  minReplicas: 3
  maxReplicas: 20 # Highly scalable workers
  metrics:
  - type: Resource
    resource:
      name: memory # Memory is often the bottleneck for LLM agents
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: levi-worker-pdb
  namespace: sovereign
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: levi-worker
---
