name: Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest-asyncio httpx

      - name: Set up test environment variables
        run: |
          echo "SECRET_KEY=test-secret-key-for-ci-only" >> $GITHUB_ENV
          echo "DATABASE_URL=sqlite:///./test.db" >> $GITHUB_ENV
          echo "RAZORPAY_KEY_ID=rzp_test_fake" >> $GITHUB_ENV
          echo "RAZORPAY_KEY_SECRET=fake_secret" >> $GITHUB_ENV
          echo "RAZORPAY_WEBHOOK_SECRET=fake_webhook_secret" >> $GITHUB_ENV
          echo "TOGETHER_API_KEY=fake_together_key" >> $GITHUB_ENV
          echo "GROQ_API_KEY=fake_groq_key" >> $GITHUB_ENV
          echo "REDIS_URL=redis://localhost:6379" >> $GITHUB_ENV

      - name: Run tests
        run: pytest backend/tests/ --tb=short -v

  load-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run k6 load test
        run: |
          k6 run scripts/k6_load_test.js
