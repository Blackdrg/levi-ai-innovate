<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#09090f">
    <title>LEVI Feed — Community Wisdom</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
        rel="stylesheet">
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        space: '#09090f',
                        indigo: {
                            950: '#1e1b4b',
                            900: '#312e81',
                            800: '#3730a3',
                        },
                        gold: {
                            DEFAULT: '#d4af37',
                            light: '#f1e5ac',
                            dark: '#996515',
                        }
                    },
                    fontFamily: {
                        display: ['Cormorant Garamond', 'serif'],
                        sans: ['DM Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background-color: #09090f;
            color: #e2e8f0;
            overflow-x: hidden;
        }
    
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.05;
            pointer-events: none;
            z-index: 50;
        }
    
        .glass {
            background: rgba(255, 255, 255, 0.03);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    
        .nav-blur {
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            background: rgba(9, 9, 15, 0.8);
        }
    
        .gold-gradient {
            background: linear-gradient(to right, #d4af37, #f1e5ac, #996515);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    
        .feed-card {
            break-inside: avoid;
            margin-bottom: 2rem;
            transition: all 0.4s ease;
        }
    
        .feed-card:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body class="font-sans min-h-screen">
    <div class="noise-overlay"></div>

    <!-- Navbar -->
    <nav class="fixed top-0 left-0 w-full z-40 nav-blur border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <a href="index.html" class="font-display text-3xl font-bold gold-gradient tracking-wider">LEVI</a>
            <div class="hidden md:flex items-center space-x-8">
                <a href="index.html" class="text-sm font-medium hover:text-gold transition-colors">Home</a>
                <a href="chat.html" class="text-sm font-medium hover:text-gold transition-colors">AI Chat</a>
                <a href="studio.html" class="text-sm font-medium hover:text-gold transition-colors">Studio</a>
                <a href="feed.html" class="text-sm font-medium text-gold transition-colors">Feed</a>
                <a href="quotes.html" class="text-sm font-medium hover:text-gold transition-colors">Explore</a>
                <a href="auth.html" id="nav-auth-btn"
                    class="px-5 py-2 glass rounded-full text-sm font-semibold border border-gold/20 text-gold hover:bg-gold hover:text-space transition-all duration-300">Sign
                    In</a>
            </div>
            <button class="md:hidden text-white" aria-label="Toggle Menu">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
        </div>
    </nav>

    <main class="pt-40 pb-20 px-6">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row md:items-end justify-between mb-16 gap-6">
                <div>
                    <h1 class="font-display text-6xl font-bold mb-4">The <span
                            class="gold-gradient italic">Collective</span> Pulse</h1>
                    <p class="text-slate-400">Discover what the world is creating with LEVI.</p>
                </div>
                <div class="flex gap-4">
                    <button
                        class="px-6 py-3 glass rounded-xl text-xs font-bold tracking-widest uppercase border-gold/20 text-gold hover:bg-gold hover:text-space transition-all">Latest</button>
                    <button
                        class="px-6 py-3 glass rounded-xl text-xs font-bold tracking-widest uppercase border-white/10 hover:border-gold/30 transition-all">Trending</button>
                </div>
                </div>

            <!-- Feed Grid (Masonry-like) -->
            <div id="feed-grid" class="columns-1 sm:columns-2 lg:columns-3 gap-8">
                <!-- Feed items will be injected here -->
            </div>

            <!-- Loading State -->
            <div id="loading" class="py-20 text-center">
                <div class="animate-spin w-10 h-10 border-4 border-gold/30 border-t-gold rounded-full mx-auto mb-4"></div>
            </div>
        </div>
    </main>

    <script type="module">
            import { getFeed, likeItem } from './js/api.js';

            const grid = document.getElementById('feed-grid');
            const loading = document.getElementById('loading');
            let currentLimit = 12;

            async function loadFeed(limit = 12, append = false) {
            try {
                loading.classList.remove('hidden');
                const items = await getFeed(limit);
                loading.classList.add('hidden');
                
                if (!items || items.length === 0) {
                    if (!append) grid.innerHTML = '<div class="col-span-full text-center py-20 text-slate-500 italic">The archive is empty. Be the first to share!</div>';
                    return;
                }

                if (!append) grid.innerHTML = '';

                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'feed-card glass rounded-[2rem] border border-white/10 overflow-hidden relative group';

                    card.innerHTML = `
                        <div class="relative aspect-square overflow-hidden">
                            <img src="${item.image_b64}" alt="AI Generated Wisdom" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                            <div class="absolute inset-0 bg-gradient-to-t from-space/90 via-space/20 to-transparent opacity-60 group-hover:opacity-80 transition-opacity"></div>
                        </div>
                        <div class="p-8 relative">
                            <p class="font-display text-xl italic mb-6 leading-relaxed">"${item.text}"</p>
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full bg-gold/10 flex items-center justify-center text-[10px] font-bold text-gold border border-gold/20">
                                        ${item.author ? item.author[0] : 'L'}
                                    </div>
                                    <span class="text-xs font-medium text-slate-400">${item.author || 'Anonymous Seeker'}</span>
                                </div>
                                <div class="flex items-center gap-4">
                                    <button onclick="window.likeFeedItem(this, ${item.id})" class="flex items-center gap-2 text-xs font-bold text-slate-500 hover:text-pink-400 transition-colors" aria-label="Like Post">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                                        </svg>
                                        <span>${item.likes || 0}</span>
                                    </button>
                                    <button onclick="window.shareFeedItem('${item.text}', '${item.author}')" class="text-slate-500 hover:text-yellow-400 transition-colors" aria-label="Share">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                loading.innerText = 'The cosmic connection failed. Please try again.';
                loading.classList.remove('hidden');
            }
        }

            window.likeFeedItem = async (btn, id) => {
            try {
                const res = await likeItem('feed', id);
                if (res) {
                    const span = btn.querySelector('span');
                    span.innerText = res.new_likes;
                    btn.classList.add('text-pink-400');
                    btn.querySelector('svg').setAttribute('fill', 'currentColor');
                }
            } catch (err) {
                console.error(err);
            }
        };

                window.shareFeedItem = async (text, author) => {
                    const quoteText = `"${text}" — ${author}`;
                    const shareUrl = window.location.href;

                    if (window.ui && window.ui.shareContent) {
                        await window.ui.shareContent("LEVI AI Wisdom", quoteText, shareUrl);
                    } else {
                        // Fallback if ui.js not loaded as module
                        navigator.clipboard.writeText(quoteText);
                        alert("Quote copied to clipboard!");
                    }
                };

            // Infinite Scroll Logic
            window.addEventListener('scroll', () => {
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                    if (loading.classList.contains('hidden')) {
                        currentLimit += 6;
                        loadFeed(currentLimit, false); // Fetching more for simple masonry update
                    }
                }
            });

        loadFeed();

    // Auth Nav
    const user = localStorage.getItem('levi_user');
    if (user) {
        document.getElementById('nav-auth-btn').innerText = user;
        document.getElementById('nav-auth-btn').href = 'my-gallery.html';
    }
    </script>
</body>
</html>
