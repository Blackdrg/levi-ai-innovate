apiVersion: apps/v1
kind: Deployment
metadata:
  name: faiss-mcm-service
  namespace: levi-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: faiss-mcm
  template:
    metadata:
      labels:
        app: faiss-mcm
    spec:
      containers:
      - name: faiss-mcm
        image: bitnami/python:3.11-debian-11
        command: ["python", "backend/services/mcm/server.py"]
        ports:
        - containerPort: 8081
        env:
        - name: FAISS_INDEX_PATH
          value: "/data/faiss/index.bin"
        - name: MEMORY_RESONANCE_MODE
          value: "distributed"
        volumeMounts:
        - name: faiss-data
          mountPath: /data/faiss
      volumes:
      - name: faiss-data
        persistentVolumeClaim:
          claimName: faiss-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: faiss-mcm
  namespace: levi-ai
spec:
  ports:
  - port: 8081
    targetPort: 8081
  selector:
    app: faiss-mcm
