version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - levi-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
      - SERVICE_MODE=all
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - redis
    volumes:
      - ./backend/data:/app/data
    networks:
      - levi-net

  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    command: celery -A backend.celery_app worker --loglevel=info --queues=default,heavy
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
    depends_on:
      - redis
    volumes:
      - ./backend/data:/app/data
    networks:
      - levi-net

  celery_beat:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    command: celery -A backend.celery_app beat --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    depends_on:
      - redis
    networks:
      - levi-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - levi-net

networks:
  levi-net:
    driver: bridge

volumes:
  redis_data:
  backend_data:
