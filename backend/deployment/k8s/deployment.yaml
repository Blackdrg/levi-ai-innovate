apiVersion: apps/v1
kind: Deployment
metadata:
  name: levi-brain-v12
  labels:
    app: levi-brain
spec:
  replicas: 3
  selector:
    matchLabels:
      app: levi-brain
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: levi-brain
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
      - name: brain
        image: gcr.io/levi-ai/brain:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: brain-config
        - secretRef:
            name: brain-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: levi-brain-api
spec:
  selector:
    app: levi-brain
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
