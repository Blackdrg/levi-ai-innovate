# .github/workflows/sovereign_graduate.yml
name: LEVI-AI Sovereign Graduation Pipeline (v15.0)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: levi-backend
  IMAGE_NAME: levi-backend
  REGIONS: '["us-central1", "europe-west1"]' # Multi-region deployment map

jobs:
  # --- STAGE 1-3: Quality & Certification ---
  certification-gate:
    name: "🛡️ Certification Gate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Lint & Type Check
        run: |
          ruff check .
          mypy backend/
      - name: Run T0-T3 Tests
        run: pytest tests/unit tests/integration

  # --- STAGE 4: Security & Red-Teaming ---
  security-gate:
    name: "🔒 Security Gate"
    needs: certification-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build temporary image
        run: docker build -t levi-ai:audit .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'levi-ai:audit'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
      - name: Run ARCA Red-Teaming Simulation
        run: python -m backend.core.v8.arca --simulate-all-categories

  # --- STAGE 5: Multi-Region Artifact Build ---
  build-and-push:
    name: "📦 Global Artifact Synthesis"
    needs: security-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
      - name: Configure Docker
        run: gcloud auth configure-docker
      - name: Build & Push (GCR)
        run: |
          docker build -t gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest .
          docker tag gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest \
                     gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest
          docker push gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # --- STAGE 6: Multi-Region Deployment ---
  deploy-multi-region:
    name: "🚀 Multi-Region Graduation"
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        region: [us-central1, europe-west1]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
      - name: Deploy to Cloud Run (${{ matrix.region }})
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }}-${{ matrix.region }} \
            --image gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ matrix.region }} \
            --set-env-vars=ENVIRONMENT=production,DCN_REGION=${{ matrix.region }} \
            --memory=2Gi --cpu=2 --max-instances=10

  # --- STAGE 7: Post-Deploy Chaos Audit ---
  post-deploy-audit:
    name: "🧪 Post-Deploy Chaos Audit"
    needs: deploy-multi-region
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Run Global Chaos Validation
        run: python backend/scripts/chaos_failover_test.py
        env:
          TARGET_URL: ${{ secrets.GLOBAL_LB_IP }}
          TEST_MODE: production
