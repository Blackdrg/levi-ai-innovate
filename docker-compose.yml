# docker-compose.yml
version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: levi
      POSTGRES_PASSWORD: levi_password
      POSTGRES_DB: levi_db
    ports:
      - "5432:5432"

  api-alpha:
    build: .
    environment:
      - DATABASE_URL=postgresql+asyncpg://levi:levi_password@postgres:5432/levi_db
      - REDIS_URL=redis://redis:6379/0
      - DCN_NODE_ID=node-us-east1-alpha
      - DCN_REGION=us-east-1
      - DCN_SECRET=super_secret_dcn_token_32_chars_long_12345
    depends_on:
      - redis
      - postgres
    ports:
      - "8001:8000"
      - "9001:9000"

  api-bravo:
    build: .
    environment:
      - DATABASE_URL=postgresql+asyncpg://levi:levi_password@postgres:5432/levi_db
      - REDIS_URL=redis://redis:6379/0
      - DCN_NODE_ID=node-us-east1-bravo
      - DCN_REGION=us-east-1
      - DCN_SECRET=super_secret_dcn_token_32_chars_long_12345
    depends_on:
      - redis
      - postgres
    ports:
      - "8002:8000"
      - "9002:9000"

  dashboard:
    build:
      context: ./frontend_react
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8001
