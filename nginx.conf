##
## LEVI-AI Nginx Production Config
##
## Serves the frontend SPA from /usr/share/nginx/html.
## Proxies all /api/ calls to the FastAPI gateway at gateway:8000.
## Includes SSE (Server-Sent Events) support for /chat and /stream endpoints.
##

server {
    listen 80;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # ── Frontend SPA ──────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API Proxy → FastAPI Gateway ───────────────────────────
    location /api/ {
        proxy_pass         http://gateway:8000/;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — generous for LLM responses
        proxy_connect_timeout  10s;
        proxy_read_timeout     120s;
        proxy_send_timeout     60s;

        # Disable request/response buffering for SSE to work correctly
        proxy_buffering        off;
        proxy_cache            off;

        # SSE / Streaming support
        proxy_set_header   Connection "";
        chunked_transfer_encoding on;
    }

    # ── SSE Endpoints (explicit — longer timeout) ─────────────
    location ~ ^/api/(chat|stream) {
        proxy_pass         http://gateway:8000/$1$is_args$args;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # SSE: never buffer, never cache
        proxy_buffering    off;
        proxy_cache        off;

        # Long timeout for streaming responses (5 min)
        proxy_read_timeout 300s;

        # Correct MIME type for SSE
        add_header Content-Type "text/event-stream" always;
        chunked_transfer_encoding on;
    }

    # ── Health Check Passthrough ──────────────────────────────
    location /health {
        proxy_pass         http://gateway:8000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
    }
}
