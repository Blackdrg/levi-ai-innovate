apiVersion: apps/v1
kind: Deployment
metadata:
  name: levi-api
  labels:
    app: levi-api
    tier: brain
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: levi-api
  template:
    metadata:
      labels:
        app: levi-api
    spec:
      containers:
      - name: api
        image: gcr.io/levi-sovereign/api:v16.0.0-GA
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: levi-secrets
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "4000m"
            memory: "8Gi"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 45
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 15

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: levi-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: levi-api
  minReplicas: 3
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 65
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 75

---
apiVersion: v1
kind: Service
metadata:
  name: levi-api-lb
  annotations:
    networking.gke.io/load-balancer-type: "External"
    cloud.google.com/l4-rbs: "enabled" # Enable Global Load Balancing
spec:
  type: LoadBalancer
  selector:
    app: levi-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
