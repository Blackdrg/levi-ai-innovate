<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#09090f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Payment Successful — LEVI</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background: #09090f;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: sans-serif;
      }
    
      .container {
        text-align: center;
        padding: 2rem;
      }
    
      .icon {
        font-size: 4rem;
        margin-bottom: 1rem;
        color: #d4af37;
      }
    
      .title {
        font-size: 2rem;
        margin-bottom: 0.5rem;
      }
    
      .subtitle {
        color: #94a3b8;
        margin-bottom: 2rem;
      }
    
      .btn-primary {
        background: #d4af37;
        color: #09090f;
        padding: 1rem 2rem;
        border-radius: 1rem;
        font-weight: bold;
        text-decoration: none;
        display: inline-block;
        transition: opacity 0.2s;
      }
    
      .btn-primary:hover {
        opacity: 0.9;
      }
    </style>
</head>
<body>
  <div class="container">
    <div class="icon">✓</div>
    <h1 class="title">Payment successful!</h1>
    <p class="subtitle">Your account has been upgraded.</p>
    <a href="studio.html" class="btn-primary">Go to Studio</a>
  </div>
  <script type="module">
    import { getProfile } from './js/api.js';
    import './js/ui.js';

    async function init() {
      const token = localStorage.getItem('levi_token');
                    if (!token) {
                      window.location.href = 'auth.html';
                      return;
                    }

                    try {
                      // Refresh profile to update credits in local state
                      const profile = await getProfile(token);
                      localStorage.setItem('levi_user', profile.username);
                      localStorage.setItem('levi_credits', profile.credits);
                      localStorage.setItem('levi_tier', profile.tier);

                      window.ui.showToast("Account upgraded successfully! ✨");
                    } catch (err) {
                      console.error("Profile refresh failed:", err);
                    }
                  }
                  init();
                </script>
</body>
</html>
