services:
  # ── Local LLM ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ${LEVI_DATA_DIR:-./data}/ollama:/root/.ollama
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]  # Uncomment if you have an NVIDIA GPU
    restart: unless-stopped

  ollama-init:
    # pulls models on first boot
    image: ollama/ollama:latest
    depends_on: [ ollama ]
    entrypoint: >
      sh -c "sleep 5 &&
             ollama pull llama3.1:8b &&
             ollama pull nomic-embed-text &&
             ollama pull codellama:13b"
    environment:
      - OLLAMA_HOST=http://ollama:11434

  # ── Databases ──────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: levi
      POSTGRES_PASSWORD: sovereign_pass
      POSTGRES_DB: levi_db
    volumes:
      - ${LEVI_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
      - ./backend/migrations/v13_migration.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ${LEVI_DATA_DIR:-./data}/redis:/data
    command: redis-server --appendonly yes --appendfsync everysec
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/sovereign_graph
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474" # browser UI
      - "7687:7687" # bolt
    volumes:
      - ${LEVI_DATA_DIR:-./data}/neo4j:/data
    restart: unless-stopped

  # ── App ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://levi:sovereign_pass@postgres:5432/levi_db
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=sovereign_graph
      - OLLAMA_BASE_URL=http://ollama:11434
      - VECTOR_DB_PATH=/app/vault/vector_hnsw.index
      - SOVEREIGN_SHIELD=true
      - JWT_SECRET=f7e7eac8b6679e3a6b651a6707de960ca07215a806216a3227b98f4bc3d5b3dd
      # Graduation Tier: Security & Audit
      - AUDIT_CHAIN_SECRET=sovereign_monolith_genesis_v13
      - INTERNAL_SERVICE_KEY=svc_internal_grad_777_absolute
      - ENVIRONMENT=production
      # Only needed as fallback — can remove for 100% local
      - GROQ_API_KEY=${GROQ_API_KEY:-}
    volumes:
      - ./vault:/app/vault
    depends_on:
      - postgres
      - redis
      - neo4j
      - ollama
    restart: unless-stopped

  # ── Worker ─────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A backend.celery_app worker --loglevel=info -Q missions,agents,learning
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://levi:sovereign_pass@postgres:5432/levi_db
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  # ── Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certs:/etc/nginx/certs
      - ./levi-frontend/dist:/usr/share/nginx/html
    depends_on:
      - api
    restart: unless-stopped

  # ── Observability ──────────────────────────────────────
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus


# 🏛️ Volume Finalization: All data now localized to D:\LEVI-AI\data
