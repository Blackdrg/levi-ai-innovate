<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#09090f">
    <title>Lost in Space — LEVI AI</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        space: '#09090f',
                    },
                    fontFamily: {
                        display: ['Cormorant Garamond', 'serif'],
                        sans: ['DM Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #09090f; color: #e2e8f0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); z-index: -1; opacity: 0.3; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 overflow-hidden">
    <div class="orb w-96 h-96 bg-violet-600/20 top-[-10%] left-[-10%] animate-pulse"></div>
    <div class="orb w-80 h-80 bg-blue-600/20 bottom-[-10%] right-[-10%] animate-pulse" style="animation-delay: 2s"></div>

    <div class="max-w-md w-full text-center space-y-8 animate-fade-in">
        <div class="space-y-4">
            <h1 class="text-7xl font-display italic text-transparent bg-clip-text bg-gradient-to-b from-white to-white/20">404</h1>
            <h2 class="text-2xl font-sans tracking-widest uppercase text-violet-400">Lost in Space</h2>
            <p class="text-slate-400 font-sans leading-relaxed">
                The wisdom you seek has drifted beyond the horizon. 
                The cosmic winds might have shifted, or the path was never there.
            </p>
        </div>

        <div class="pt-4">
            <a href="index.html" class="inline-block px-8 py-4 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 transition-all duration-300 group">
                <span class="font-sans tracking-widest uppercase text-xs flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    Return to Orbit
                </span>
            </a>
        </div>
    </div>
</body>
</html>
