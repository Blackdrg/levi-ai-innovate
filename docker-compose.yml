services:
  db:
    image: ankane/pgvector
    environment:
      POSTGRES_USER: levi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-levi}
      POSTGRES_DB: levi
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U levi"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: 
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://levi:${POSTGRES_PASSWORD:-levi}@db:5432/levi
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-prod}
      CORS_ORIGINS: "*"
      PYTHONUNBUFFERED: 1
      USE_CELERY: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://levi:${POSTGRES_PASSWORD:-levi}@db:5432/levi
      REDIS_URL: redis://redis:6379
      USE_CELERY: "true"
      PYTHONUNBUFFERED: 1
    volumes:
      - ./backend:/app
      - ./model_cache:/app/model_cache

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      gateway:
        condition: service_healthy
    restart: always


volumes:
  postgres_data:

