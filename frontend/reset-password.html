<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <title>LEVI — Reset Password</title>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&display=swap" rel="stylesheet"/>
    <link href="./css/output.css" rel="stylesheet">
    <!-- Firebase & Auth Init (Early) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth-manager.js"></script>
    <style>
        body {
            background-color: #131317;
            font-family: "Plus Jakarta Sans", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .glass-card {
            background: rgba(27, 27, 31, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-surface text-on-surface">
    <div class="w-full max-w-md p-8 rounded-3xl glass-card shadow-2xl">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-serif italic text-primary mb-2">Reset Password</h1>
            <p class="text-zinc-400 text-sm">Enter your new celestial access key below.</p>
        </div>

        <form id="reset-form" class="space-y-6">
            <div>
                <label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2 font-bold">New Password</label>
                <input type="password" id="password" required minlength="8"
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary/50 transition-all"
                    placeholder="••••••••">
            </div>
            <div>
                <label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2 font-bold">Confirm Password</label>
                <input type="password" id="confirm-password" required minlength="8"
                    class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary/50 transition-all"
                    placeholder="••••••••">
            </div>

            <button type="submit" id="submit-btn"
                class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-xl hover:scale-[1.02] active:scale-[0.98] transition-all disabled:opacity-50">
                Update Password
            </button>
        </form>

        <div id="message" class="mt-6 text-center text-sm hidden"></div>
        
        <div class="mt-8 text-center">
            <a href="auth.html" class="text-zinc-500 hover:text-primary text-xs uppercase tracking-widest transition-colors">Back to Login</a>
        </div>
    </div>

    <script src="js/ui.js" type="module"></script>
    <script type="module">
        const form = document.getElementById('reset-form');
        const submitBtn = document.getElementById('submit-btn');
        const messageDiv = document.getElementById('message');

        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            messageDiv.textContent = "Error: Invalid or missing reset token.";
            messageDiv.className = "mt-6 text-center text-sm text-red-400";
            messageDiv.classList.remove('hidden');
            submitBtn.disabled = true;
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (password !== confirm) {
                alert("Passwords do not match.");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "Updating...";
            if (window.ui && window.ui.showLoader) window.ui.showLoader();

            try {
                const res = await fetch(`${window.API_BASE}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: password })
                });

                if (!res.ok) {
                    const data = await res.json().catch(() => ({}));
                    throw new Error(data.detail || "Reset failed");
                }

                const data = await res.json();
                messageDiv.textContent = data.message;
                messageDiv.className = "mt-6 text-center text-sm text-green-400";
                messageDiv.classList.remove('hidden');
                form.classList.add('hidden');
                showToast("Password updated successfully!", "success");
                setTimeout(() => window.location.href = 'auth.html', 3000);
            } catch (err) {
                console.error("Reset password error:", err);
                messageDiv.textContent = err.message;
                messageDiv.className = "mt-6 text-center text-sm text-red-400";
                messageDiv.classList.remove('hidden');
                showToast("Network error", "error");
                submitBtn.disabled = false;
                submitBtn.textContent = "Update Password";
            } finally {
                if (window.ui && window.ui.hideLoader) window.ui.hideLoader();
            }
        };

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            const bg = type === 'error' ? 'rgba(127,29,29,.9)' : 'rgba(19,19,23,.92)';
            t.innerHTML = `<div style="background:${bg};border:0.5px solid rgba(255,255,255,0.1);backdrop-filter:blur(20px);padding:10px 24px;border-radius:9999px;color:white;font-size:12px;font-weight:600;box-shadow:0 10px 40px rgba(0,0,0,0.5)">${msg}</div>`;
            t.classList.remove('opacity-0');
            t.classList.add('translate-y-0');
            setTimeout(() => {
                t.classList.add('opacity-0');
            }, 3000);
        }
    </script>
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 opacity-0 transition-all duration-300 z-50 pointer-events-none"></div>
</body>
</html>
