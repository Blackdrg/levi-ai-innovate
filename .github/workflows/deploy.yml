name: LEVI-AI Absolute Monolith Graduation (v13.0.0)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  graduation-audit:
    name: Absolute Monolith Graduation Audit
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: levi
          POSTGRES_PASSWORD: levi
          POSTGRES_DB: levi_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install Monolith Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-asyncio

    - name: Execute v13.0.0 Master Audit
      env:
        REDIS_URL: redis://localhost:6379/0
        DATABASE_URL: postgresql://levi:levi@localhost:5432/levi_db
        SWARM_SYNC_KEY: ${{ secrets.SWARM_SYNC_KEY }}
        TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
      run: |
        python tests/verify_v13_monolith.py

    - name: Build Absolute Monolith Container
      run: |
        docker build -t levi-ai:v13.0.0-monolith -f backend/Dockerfile.prod .
