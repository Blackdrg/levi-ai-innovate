apiVersion: apps/v1
kind: Deployment
metadata:
  name: levi-backend
  namespace: sovereign
spec:
  replicas: 3
  selector:
    matchLabels:
      app: levi-backend
  template:
    metadata:
      labels:
        app: levi-backend
    spec:
      containers:
      - name: backend
        image: gcr.io/levi-ai/backend:v13.0.0
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: levi-secrets
        - configMapRef:
            name: levi-config
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 20
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 10"]
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: levi-backend
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: levi-backend-hpa
  namespace: sovereign
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: levi-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: levi-backend-pdb
  namespace: sovereign
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: levi-backend
---
apiVersion: v1
kind: Service
metadata:
  name: levi-backend-svc
  namespace: sovereign
spec:
  selector:
    app: levi-backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
