services:
  - type: web
    name: backend
    runtime: docker
    dockerfilePath: backend/Dockerfile.prod
    dockerContext: .
    plan: free
    healthCheckPath: /health

    envVars:
      - key: RENDER
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: levi-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: USE_CELERY
        value: "true"
      - key: CORS_ORIGINS
        value: "https://levi-ai.vercel.app,https://levi-git-main-daksh-mehats-projects.vercel.app,https://levi-k8iuadcvd-daksh-mehats-projects.vercel.app,https://levi-ai-daksh-mehats-projects.vercel.app"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TRANSFORMERS_CACHE
        value: /app/model_cache
      - key: ADMIN_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: WEB_CONCURRENCY
        value: "1"
      - key: PORT
        value: "10000"



  - type: worker
    name: celery-worker
    runtime: docker
    dockerFilePath: backend/Dockerfile.prod
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: levi-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: USE_CELERY
        value: "true"
      - key: GROQ_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: RESEND_API_KEY # Sync RESEND_API_KEY for emails in tasks
        sync: false

databases:
  - name: levi-db
    plan: free
