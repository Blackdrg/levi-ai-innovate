name: LEVI-AI Sovereign CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    # backend Setup
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Backend Tests
      run: |
        pytest tests/
      continue-on-error: true # Allow for now until full test coverage

    # Frontend Setup
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: 'frontend/react-app/package-lock.json'
        
    - name: Install Frontend Dependencies
      run: |
        cd frontend/react-app
        npm install
        
    - name: Build React App
      run: |
        cd frontend/react-app
        npm run build
        
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v3
      with:
        name: react-dist
        path: frontend/react-app/dist/

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy Announcement
      run: echo "📦 LEVI-AI Build Successful. Ready for Sovereign Deployment."
